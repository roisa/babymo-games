<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#A8E063" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Baby Mo · Forehand Beat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F6F9F3;
    --cream-deep: #ECF3E2;
    --soft-green: #A8E063;
    --forest: #6CC247;
    --forest-deep: #4FA42F;
    --yellow: #FFD34D;
    --yellow-deep: #F4B833;
    --blue: #5BC0EB;
    --blue-deep: #3FA3CF;
    --pink: #FFB7B2;
    --orange: #FF9758;
    --ink: #2D4A1F;
    --shadow: rgba(45, 74, 31, 0.18);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Nunito', system-ui, sans-serif; color: var(--ink); }
  body {
    background:
      radial-gradient(circle at 20% 10%, #DDF1B8 0%, transparent 55%),
      radial-gradient(circle at 80% 30%, #C6E8FA 0%, transparent 50%),
      linear-gradient(180deg, #E9F6D4 0%, #F6F9F3 60%, #FFF8E0 100%);
    display: flex; align-items: center; justify-content: center;
    overscroll-behavior: none;
  }

  /* === Game frame: portrait 9:16, scales to viewport === */
  #frame {
    position: relative;
    width: min(100vw, calc(100vh * 9 / 16));
    height: min(100vh, calc(100vw * 16 / 9));
    max-width: 520px;
    max-height: 100vh;
    background: linear-gradient(180deg, #C6E8FA 0%, #DDF1B8 55%, #F6F9F3 80%, #FFF8E0 100%);
    border-radius: 0;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(45, 74, 31, 0.15);
  }
  @media (min-aspect-ratio: 9/16) {
    #frame { border-radius: 28px; }
  }

  /* === Decorative sky elements === */
  .sun {
    position: absolute; top: 8%; right: 12%;
    width: 70px; height: 70px; border-radius: 50%;
    background: radial-gradient(circle, #FFE89A 0%, var(--yellow) 60%, transparent 75%);
    filter: blur(0.5px);
    animation: sunPulse 4s ease-in-out infinite;
    z-index: 1;
  }
  @keyframes sunPulse {
    0%,100% { transform: scale(1); opacity: 0.95; }
    50% { transform: scale(1.06); opacity: 1; }
  }
  .cloud {
    position: absolute;
    background: rgba(255,255,255,0.85);
    border-radius: 50%;
    box-shadow:
      24px 4px 0 -2px rgba(255,255,255,0.85),
      -22px 4px 0 -3px rgba(255,255,255,0.85),
      10px -10px 0 -4px rgba(255,255,255,0.85),
      -12px -8px 0 -5px rgba(255,255,255,0.85);
    z-index: 1;
  }

  /* === Canvas (gameplay) === */
  canvas#game {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    z-index: 2;
    display: block;
  }

  /* === HUD === */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    padding: max(env(safe-area-inset-top), 14px) 14px 0;
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
    z-index: 10;
    pointer-events: none;
  }
  .hud-pill {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 999px;
    padding: 8px 16px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    color: var(--ink);
    box-shadow: 0 4px 0 var(--shadow), 0 8px 18px rgba(0,0,0,0.06);
    display: flex; align-items: center; gap: 6px;
    line-height: 1;
    pointer-events: auto;
  }
  .hud-pill .label { font-size: 11px; color: var(--forest-deep); text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.7; }
  .hud-pill .num { font-size: 18px; min-width: 22px; text-align: center; }
  #score-pill { background: linear-gradient(180deg, #FFFFFF 0%, #F4FBE6 100%); }
  #stars-pill { background: linear-gradient(180deg, #FFF7D9 0%, #FFE8A0 100%); }
  #stars-pill .num { color: var(--yellow-deep); }
  .icon-btn {
    width: 42px; height: 42px; border-radius: 50%;
    border: none; background: rgba(255,255,255,0.92);
    box-shadow: 0 4px 0 var(--shadow), 0 8px 18px rgba(0,0,0,0.06);
    font-size: 18px; cursor: pointer; pointer-events: auto;
    display: flex; align-items: center; justify-content: center;
    color: var(--forest-deep);
    transition: transform 0.15s ease;
  }
  .icon-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--shadow); }
  #ctrl-cluster { display: flex; gap: 8px; }

  /* === Beat pulse ring around hud === */
  #beat-glow {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 3;
    box-shadow: inset 0 0 0 0 rgba(168, 224, 99, 0);
    transition: box-shadow 0.18s ease-out;
  }
  #beat-glow.hit { box-shadow: inset 0 0 60px 4px rgba(168, 224, 99, 0.4); transition: box-shadow 0.05s; }

  /* === Screens (overlays) === */
  .screen {
    position: absolute; inset: 0;
    z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 32px 24px;
    gap: 16px;
    text-align: center;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .screen.hidden { opacity: 0; transform: scale(0.96); pointer-events: none; }

  #home {
    background:
      radial-gradient(circle at 50% 30%, rgba(255,255,255,0.0) 40%, rgba(168, 224, 99, 0.18) 100%),
      linear-gradient(180deg, rgba(198, 232, 250, 0.6) 0%, rgba(221, 241, 184, 0.7) 60%, rgba(255, 248, 224, 0.6) 100%);
    backdrop-filter: blur(2px);
  }
  .logo-wrap {
    width: 64%; max-width: 280px;
    animation: logoFloat 3.2s ease-in-out infinite;
    filter: drop-shadow(0 14px 24px rgba(108, 194, 71, 0.3));
  }
  .logo-wrap img { width: 100%; height: auto; display: block; }
  @keyframes logoFloat {
    0%,100% { transform: translateY(0) rotate(-1.2deg); }
    50% { transform: translateY(-10px) rotate(1.2deg); }
  }
  .tagline {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: var(--forest-deep);
    margin: 4px 0 8px;
    text-shadow: 0 2px 0 rgba(255,255,255,0.7);
  }
  .tagline .accent { color: var(--yellow-deep); }
  .big-btn {
    border: none;
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: white;
    background: linear-gradient(180deg, var(--soft-green) 0%, var(--forest) 100%);
    border: 4px solid white;
    border-radius: 999px;
    padding: 16px 38px;
    box-shadow: 0 6px 0 var(--forest-deep), 0 14px 24px rgba(108, 194, 71, 0.35);
    cursor: pointer;
    letter-spacing: 0.02em;
    text-shadow: 0 2px 0 rgba(0,0,0,0.12);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
    animation: btnPulse 1.6s ease-in-out infinite;
  }
  .big-btn:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 var(--forest-deep), 0 6px 12px rgba(108, 194, 71, 0.35);
    animation: none;
  }
  .big-btn.secondary {
    background: linear-gradient(180deg, #FFFFFF 0%, #F4FBE6 100%);
    color: var(--forest-deep);
    box-shadow: 0 6px 0 #C8DEAA, 0 14px 24px rgba(108, 194, 71, 0.18);
    text-shadow: none;
    animation: none;
  }
  .big-btn.secondary:active {
    box-shadow: 0 2px 0 #C8DEAA, 0 6px 12px rgba(108, 194, 71, 0.18);
  }
  @keyframes btnPulse {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }
  .hint {
    font-size: 14px; font-weight: 600;
    color: var(--forest-deep); opacity: 0.8;
    margin-top: 4px;
    letter-spacing: 0.02em;
  }
  .hint .emoji { font-size: 18px; }
  /* floating tennis balls on home */
  .float-ball {
    position: absolute;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #FFFA9D 0%, var(--yellow) 70%);
    box-shadow: 0 4px 10px rgba(244, 184, 51, 0.45), inset -3px -4px 6px rgba(0,0,0,0.08);
    z-index: -1;
    animation: floatY 4s ease-in-out infinite;
    opacity: 0.85;
  }
  .float-ball::before, .float-ball::after {
    content: ''; position: absolute; inset: 0;
    border-radius: 50%;
    border: 2px solid white;
    border-top-color: transparent; border-left-color: transparent;
    transform: rotate(35deg);
  }
  .float-ball::after { transform: rotate(-145deg); }
  @keyframes floatY {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-18px) rotate(20deg); }
  }

  /* === Pause / Game over === */
  #pause, #gameover {
    background: rgba(246, 249, 243, 0.78);
    backdrop-filter: blur(10px) saturate(1.1);
    -webkit-backdrop-filter: blur(10px) saturate(1.1);
  }
  .panel {
    background: white;
    border-radius: 28px;
    padding: 28px 26px 22px;
    box-shadow: 0 12px 0 rgba(108, 194, 71, 0.15), 0 24px 50px rgba(45, 74, 31, 0.2);
    border: 4px solid var(--soft-green);
    width: 86%; max-width: 320px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .panel h1 {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 30px;
    margin: 0;
    color: var(--forest-deep);
    line-height: 1;
    letter-spacing: 0.01em;
  }
  .panel .sub {
    font-weight: 700;
    font-size: 14px;
    color: var(--ink);
    opacity: 0.65;
    margin: -4px 0 8px;
  }
  .stat-row {
    display: flex; gap: 14px;
    width: 100%;
    justify-content: center;
  }
  .stat-card {
    flex: 1;
    background: linear-gradient(180deg, #F4FBE6 0%, #E5F1CC 100%);
    border-radius: 18px;
    padding: 12px 8px;
    text-align: center;
    border: 2px solid rgba(108, 194, 71, 0.25);
  }
  .stat-card.gold {
    background: linear-gradient(180deg, #FFF6CF 0%, #FFE69A 100%);
    border-color: rgba(244, 184, 51, 0.35);
  }
  .stat-card .v {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 28px;
    color: var(--forest-deep);
    line-height: 1;
  }
  .stat-card.gold .v { color: var(--yellow-deep); }
  .stat-card .l {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    opacity: 0.7;
    margin-top: 4px;
    font-weight: 700;
  }
  .panel-btns { display: flex; gap: 10px; margin-top: 6px; width: 100%; justify-content: center; flex-wrap: wrap; }
  .panel-btns .big-btn { font-size: 17px; padding: 12px 22px; animation: none; }

  /* === Combo popup === */
  #combo {
    position: absolute;
    top: 28%;
    left: 50%;
    transform: translate(-50%, 0) scale(0.6);
    z-index: 12;
    pointer-events: none;
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 28px;
    color: white;
    text-shadow:
      -2px -2px 0 var(--forest-deep), 2px -2px 0 var(--forest-deep),
      -2px 2px 0 var(--forest-deep), 2px 2px 0 var(--forest-deep),
      0 4px 0 var(--forest-deep), 0 8px 14px rgba(0,0,0,0.25);
    opacity: 0;
    letter-spacing: 0.02em;
    text-align: center;
  }
  #combo.show {
    animation: comboPop 0.85s cubic-bezier(.18,.89,.32,1.28) forwards;
  }
  #combo .small { font-size: 16px; display: block; opacity: 0.95; }
  @keyframes comboPop {
    0% { opacity: 0; transform: translate(-50%, 8px) scale(0.5) rotate(-4deg); }
    25% { opacity: 1; transform: translate(-50%, -4px) scale(1.15) rotate(2deg); }
    55% { transform: translate(-50%, -8px) scale(1) rotate(-1deg); }
    100% { opacity: 0; transform: translate(-50%, -32px) scale(0.95) rotate(0); }
  }

  /* === Tap-to-jump hint === */
  #tap-hint {
    position: absolute;
    bottom: 18%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 8;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 16px;
    color: var(--forest-deep);
    background: rgba(255,255,255,0.92);
    padding: 10px 22px;
    border-radius: 999px;
    box-shadow: 0 4px 0 var(--shadow), 0 8px 18px rgba(0,0,0,0.08);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.35s ease;
    animation: tapBob 1.4s ease-in-out infinite;
  }
  #tap-hint.visible { opacity: 1; }
  @keyframes tapBob {
    0%,100% { transform: translate(-50%, 0); }
    50% { transform: translate(-50%, -6px); }
  }

  /* === Loading === */
  #loading {
    position: absolute; inset: 0;
    z-index: 50;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(180deg, #C6E8FA 0%, #DDF1B8 60%, #F6F9F3 100%);
    transition: opacity 0.4s ease;
  }
  #loading.gone { opacity: 0; pointer-events: none; }
  .spinner {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 6px solid rgba(108, 194, 71, 0.18);
    border-top-color: var(--forest);
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* small phone tweaks */
  @media (max-height: 640px) {
    .panel h1 { font-size: 24px; }
    .stat-card .v { font-size: 22px; }
    .big-btn { font-size: 18px; padding: 12px 28px; }
  }
</style>
</head>
<body>
  <div id="frame">
    <!-- Atmospheric DOM elements -->
    <div class="sun"></div>
    <div class="cloud" style="top:14%; left:14%; width:46px; height:18px; opacity:0.85;"></div>
    <div class="cloud" style="top:22%; left:62%; width:36px; height:14px; opacity:0.75;"></div>
    <div class="cloud" style="top:8%;  left:42%; width:30px; height:12px; opacity:0.7;"></div>

    <!-- Game canvas -->
    <canvas id="game"></canvas>
    <div id="beat-glow"></div>

    <!-- HUD -->
    <div id="hud">
      <div class="hud-pill" id="score-pill">
        <div>
          <div class="label">Score</div>
          <div class="num" id="score-num">0</div>
        </div>
      </div>
      <div class="hud-pill" id="stars-pill">
        <div>
          <div class="label">Stars</div>
          <div class="num" id="stars-num">⭐ 0</div>
        </div>
      </div>
      <div id="ctrl-cluster">
        <button class="icon-btn" id="sound-btn" aria-label="Toggle sound">🔊</button>
        <button class="icon-btn" id="pause-btn" aria-label="Pause">⏸</button>
      </div>
    </div>

    <!-- Combo popup -->
    <div id="combo"></div>

    <!-- Tap to jump hint -->
    <div id="tap-hint">👆 Tap anywhere to jump!</div>

    <!-- Home screen -->
    <div id="home" class="screen">
      <div class="float-ball" style="top:18%; left:12%; animation-delay:0s;"></div>
      <div class="float-ball" style="top:32%; right:12%; width:28px; height:28px; animation-delay:1.2s;"></div>
      <div class="float-ball" style="bottom:24%; left:18%; width:32px; height:32px; animation-delay:0.6s;"></div>
      <div class="float-ball" style="bottom:18%; right:20%; width:24px; height:24px; animation-delay:1.8s;"></div>

      <div class="logo-wrap"><img id="logo-img" alt="Baby Mo" /></div>
      <div class="tagline">Forehand <span class="accent">Beat</span> 🎾</div>
      <button class="big-btn" id="start-btn">Tap to Start</button>
      <div class="hint"><span class="emoji">🎵</span> Jump on the beat!</div>
    </div>

    <!-- Pause screen -->
    <div id="pause" class="screen hidden">
      <div class="panel">
        <h1>Paused</h1>
        <div class="sub">Take a breather 🌿</div>
        <div class="panel-btns">
          <button class="big-btn" id="resume-btn">Resume</button>
          <button class="big-btn secondary" id="quit-btn">Home</button>
        </div>
      </div>
    </div>

    <!-- Game over screen -->
    <div id="gameover" class="screen hidden">
      <div class="panel">
        <h1 id="go-title">Great Job!</h1>
        <div class="sub" id="go-sub">Let's try again? 💚</div>
        <div class="stat-row">
          <div class="stat-card">
            <div class="v" id="go-score">0</div>
            <div class="l">Score</div>
          </div>
          <div class="stat-card gold">
            <div class="v" id="go-stars">⭐ 0</div>
            <div class="l">Stars</div>
          </div>
        </div>
        <div class="stat-row" style="margin-top:-4px;">
          <div class="stat-card" style="background:linear-gradient(180deg,#E1F2FE 0%,#BFE2F8 100%); border-color:rgba(91,192,235,0.35);">
            <div class="v" id="go-best" style="color:var(--blue-deep);">0</div>
            <div class="l">Best</div>
          </div>
        </div>
        <div class="panel-btns">
          <button class="big-btn" id="replay-btn">Play Again</button>
          <button class="big-btn secondary" id="home-btn">Home</button>
        </div>
      </div>
    </div>

    <!-- Loading screen -->
    <div id="loading"><div class="spinner"></div></div>
  </div>

  <!-- Embedded music -->
  <audio id="music" preload="auto"></audio>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   BABY MO · FOREHAND BEAT
   A toddler-safe rhythm runner. Tap to make Baby Mo jump on the beat!
   ─────────────────────────────────────────────────────────────────────────── */

/* ─── Canvas setup ──────────────────────────────────────────────────────── */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Logical (game world) dimensions, fixed aspect 9:16
const WORLD_W = 540;
const WORLD_H = 960;
let scale = 1, offsetX = 0, offsetY = 0;

function resize() {
  const rect = canvas.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.round(rect.width * dpr);
  canvas.height = Math.round(rect.height * dpr);
  // fit world inside canvas, preserving aspect
  const sx = canvas.width / WORLD_W;
  const sy = canvas.height / WORLD_H;
  scale = Math.min(sx, sy);
  offsetX = (canvas.width - WORLD_W * scale) / 2;
  offsetY = (canvas.height - WORLD_H * scale) / 2;
}
window.addEventListener('resize', resize);

/* ─── Audio setup (Web Audio for SFX + HTMLAudio for music) ─────────────── */
let audioCtx = null;
const music = document.getElementById('music');
music.src = ASSETS.song;
music.loop = true;
music.preload = 'auto';

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function sfx(type) {
  if (!state.soundOn || !audioCtx) return;
  const t = audioCtx.currentTime;
  const g = audioCtx.createGain();
  g.connect(audioCtx.destination);
  if (type === 'jump') {
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(420, t);
    o.frequency.exponentialRampToValueAtTime(820, t + 0.16);
    g.gain.setValueAtTime(0.001, t);
    g.gain.exponentialRampToValueAtTime(0.18, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
    o.connect(g); o.start(t); o.stop(t + 0.24);
  } else if (type === 'land') {
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(180, t);
    o.frequency.exponentialRampToValueAtTime(80, t + 0.12);
    g.gain.setValueAtTime(0.001, t);
    g.gain.exponentialRampToValueAtTime(0.10, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
    o.connect(g); o.start(t); o.stop(t + 0.18);
  } else if (type === 'star') {
    [880, 1320, 1760].forEach((f, i) => {
      const o = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(f, t + i * 0.06);
      g2.gain.setValueAtTime(0.001, t + i * 0.06);
      g2.gain.exponentialRampToValueAtTime(0.14, t + i * 0.06 + 0.01);
      g2.gain.exponentialRampToValueAtTime(0.001, t + i * 0.06 + 0.18);
      o.connect(g2); g2.connect(audioCtx.destination);
      o.start(t + i * 0.06); o.stop(t + i * 0.06 + 0.2);
    });
  } else if (type === 'oops') {
    const o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.setValueAtTime(360, t);
    o.frequency.exponentialRampToValueAtTime(180, t + 0.35);
    g.gain.setValueAtTime(0.001, t);
    g.gain.exponentialRampToValueAtTime(0.15, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
    o.connect(g); o.start(t); o.stop(t + 0.5);
  } else if (type === 'tick') {
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(1200, t);
    g.gain.setValueAtTime(0.001, t);
    g.gain.exponentialRampToValueAtTime(0.04, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    o.connect(g); o.start(t); o.stop(t + 0.08);
  }
}

/* ─── Background (parallax) ─────────────────────────────────────────────── */
const bgState = {
  cloudsFar: Array.from({length: 5}, (_,i) => ({
    x: Math.random() * WORLD_W, y: 80 + Math.random() * 120,
    s: 0.5 + Math.random() * 0.4, w: 60 + Math.random() * 50
  })),
  cloudsNear: Array.from({length: 3}, (_,i) => ({
    x: Math.random() * WORLD_W, y: 180 + Math.random() * 80,
    s: 0.9 + Math.random() * 0.4, w: 80 + Math.random() * 60
  })),
  trees: Array.from({length: 8}, (_,i) => ({
    x: i * 90 + Math.random() * 30, h: 120 + Math.random() * 50,
    color: ['#7BBE52','#6CC247','#94D26F'][i%3]
  })),
  grassBlades: Array.from({length: 50}, (_,i) => ({
    x: Math.random() * WORLD_W, y: GROUND_Y + 18 + Math.random() * 20,
    h: 6 + Math.random() * 8
  })),
  bgScrollFar: 0,
  bgScrollNear: 0,
  bgScrollGround: 0
};

function drawCloud(x, y, w) {
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  const r = w * 0.3;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.arc(x + r*0.9, y - r*0.3, r*0.85, 0, Math.PI*2);
  ctx.arc(x + r*1.7, y, r*0.75, 0, Math.PI*2);
  ctx.arc(x + r*0.6, y + r*0.2, r*0.7, 0, Math.PI*2);
  ctx.fill();
}

function drawBackground(dt) {
  // sky gradient is on the frame; canvas overlays
  // Soft pastel atmosphere strip
  const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  skyGrad.addColorStop(0, '#C6E8FA');
  skyGrad.addColorStop(0.55, '#DDF1B8');
  skyGrad.addColorStop(1, '#F4FBE6');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, WORLD_W, GROUND_Y);

  // Far clouds
  const moveSpeed = state.scene === 'playing' ? state.speed : BASE_SPEED * 0.4;
  bgState.bgScrollFar = (bgState.bgScrollFar + moveSpeed * 0.08 * dt) % WORLD_W;
  bgState.cloudsFar.forEach(c => {
    let x = c.x - bgState.bgScrollFar * c.s;
    while (x < -c.w) x += WORLD_W + c.w*2;
    drawCloud(x, c.y, c.w);
  });

  // Distant tree silhouette band
  bgState.bgScrollNear = (bgState.bgScrollNear + moveSpeed * 0.3 * dt) % 90;
  ctx.fillStyle = '#94D26F';
  for (let i = -1; i < 8; i++) {
    const x = i * 90 - bgState.bgScrollNear;
    const tH = 90;
    ctx.beginPath();
    ctx.moveTo(x, GROUND_Y - tH * 0.6);
    ctx.bezierCurveTo(x + 20, GROUND_Y - tH, x + 70, GROUND_Y - tH, x + 90, GROUND_Y - tH * 0.6);
    ctx.lineTo(x + 90, GROUND_Y);
    ctx.lineTo(x, GROUND_Y);
    ctx.closePath();
    ctx.fill();
  }

  // Tennis court line in background
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y - 20); ctx.lineTo(WORLD_W, GROUND_Y - 20); ctx.stroke();

  // Ground (grass court)
  const groundGrad = ctx.createLinearGradient(0, GROUND_Y, 0, WORLD_H);
  groundGrad.addColorStop(0, '#7BBE52');
  groundGrad.addColorStop(0.5, '#6CC247');
  groundGrad.addColorStop(1, '#4FA42F');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, GROUND_Y, WORLD_W, WORLD_H - GROUND_Y);

  // Court lines on ground (animated)
  bgState.bgScrollGround = (bgState.bgScrollGround + moveSpeed * dt) % 200;
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y + 8);
  ctx.lineTo(WORLD_W, GROUND_Y + 8);
  ctx.stroke();
  // Animated court tile lines
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 2;
  for (let x = -bgState.bgScrollGround; x < WORLD_W; x += 200) {
    ctx.beginPath();
    ctx.moveTo(x, GROUND_Y + 30);
    ctx.lineTo(x - 60, WORLD_H);
    ctx.stroke();
  }

  // Grass blades in foreground (parallax fastest)
  ctx.fillStyle = 'rgba(79, 164, 47, 0.6)';
  bgState.grassBlades.forEach(b => {
    let x = (b.x - bgState.bgScrollGround * 1.5) % WORLD_W;
    if (x < 0) x += WORLD_W;
    ctx.fillRect(x, b.y, 2, b.h);
  });
}

/* ─── Player rendering ──────────────────────────────────────────────────── */
function drawPlayer(dt) {
  const p = state.player;
  // bobbing while running (subtle)
  const t = state.songTime;
  const bob = p.onGround ? Math.sin(t * 12) * 4 : 0;
  const tilt = p.onGround ? Math.sin(t * 12) * 0.04 : (p.vy * 0.0006);

  // shadow
  const shadowAlpha = p.onGround ? 0.28 : Math.max(0.08, 0.28 - (GROUND_Y - p.y) * 0.0015);
  const shadowW = p.onGround ? 90 : Math.max(40, 90 - (GROUND_Y - p.y) * 0.18);
  ctx.fillStyle = `rgba(45, 74, 31, ${shadowAlpha})`;
  ctx.beginPath();
  ctx.ellipse(PLAYER_X, GROUND_Y + 6, shadowW/2, 8, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.save();
  // squash/stretch
  let sx = p.scaleX, sy = p.scaleY;
  // ease back to 1
  p.scaleX += (1 - p.scaleX) * Math.min(1, dt * 12);
  p.scaleY += (1 - p.scaleY) * Math.min(1, dt * 12);

  const w = PLAYER_BASE_W * sx;
  const h = PLAYER_BASE_H * sy;

  ctx.translate(PLAYER_X, p.y + bob);
  ctx.rotate(tilt);

  // The character image is drawn centered on its feet
  const imgW = w;
  const imgH = h;
  ctx.drawImage(charImg, -imgW/2, -imgH, imgW, imgH);

  // Tennis racket — held to his right side (at hip height), tilted forward
  // Slight bob with running cycle so it feels alive
  const racketBob = p.onGround ? Math.sin(state.songTime * 12 + 0.4) * 3 : -p.vy * 0.005;
  drawRacket(imgW * 0.42, -imgH * 0.30 + racketBob, imgW * 0.55);

  ctx.restore();
}

function drawRacket(x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(0.45); // angled forward/down, like he's about to swing
  // handle (yellow grip)
  ctx.fillStyle = '#FFD34D';
  ctx.fillRect(-3, -size * 0.05, 6, size * 0.45);
  // grip wrap detail
  ctx.strokeStyle = '#F4B833';
  ctx.lineWidth = 1;
  for (let i = 1; i < 5; i++) {
    ctx.beginPath();
    ctx.moveTo(-3, -size * 0.05 + i * 8);
    ctx.lineTo(3, -size * 0.05 + i * 8);
    ctx.stroke();
  }
  // racket head — oval, blue frame, white face
  ctx.strokeStyle = '#5BC0EB';
  ctx.lineWidth = 5;
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.beginPath();
  ctx.ellipse(0, -size * 0.34, size * 0.30, size * 0.36, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.stroke();
  // strings
  ctx.strokeStyle = 'rgba(45, 74, 31, 0.4)';
  ctx.lineWidth = 1;
  for (let i = -3; i <= 3; i++) {
    ctx.beginPath();
    ctx.moveTo(i * 6, -size * 0.34 - size * 0.32);
    ctx.lineTo(i * 6, -size * 0.34 + size * 0.32);
    ctx.stroke();
  }
  for (let i = -3; i <= 3; i++) {
    ctx.beginPath();
    ctx.moveTo(-size * 0.26, -size * 0.34 + i * 7);
    ctx.lineTo(size * 0.26, -size * 0.34 + i * 7);
    ctx.stroke();
  }
  ctx.restore();
}

/* ─── Obstacles ─────────────────────────────────────────────────────────── */
const OBSTACLE_TYPES = [
  { key: 'cone',   w: 56, h: 70,  color: '#FF9758' },
  { key: 'ball',   w: 50, h: 50,  color: '#FFD34D' },
  { key: 'net',    w: 70, h: 60,  color: '#FFFFFF' },
  { key: 'basket', w: 78, h: 80,  color: '#C0C7D1' },
  { key: 'hurdle', w: 64, h: 90,  color: '#FFFFFF' }
];

function spawnObstacle(beatTime) {
  // Difficulty-based type selection
  const t = state.songTime;
  let pool;
  // First couple of obstacles are always small tennis balls (toddler-friendly intro)
  if (state.obstacles.length === 0 && state.score === 0) pool = ['ball'];
  else if (t < 8) pool = ['cone','ball'];
  else if (t < 18) pool = ['cone','ball','net'];
  else if (t < 28) pool = ['cone','ball','net','hurdle'];
  else pool = ['cone','ball','net','hurdle','basket'];
  const key = pool[Math.floor(Math.random() * pool.length)];
  const type = OBSTACLE_TYPES.find(o => o.key === key);
  state.obstacles.push({
    type: key,
    x: SPAWN_LEAD_X,
    y: GROUND_Y,
    w: type.w, h: type.h,
    targetTime: beatTime,
    spawnTime: state.songTime,
    passed: false,
    bounce: 0
  });
}

function drawObstacle(o) {
  ctx.save();
  ctx.translate(o.x, o.y);
  // gentle bounce
  o.bounce += 0.12;
  const bobY = Math.sin(o.bounce) * 2;
  ctx.translate(0, bobY);

  // shadow
  ctx.fillStyle = 'rgba(45, 74, 31, 0.22)';
  ctx.beginPath();
  ctx.ellipse(0, 6, o.w * 0.45, 5, 0, 0, Math.PI*2);
  ctx.fill();

  if (o.type === 'cone') {
    // base
    ctx.fillStyle = '#E6792E';
    ctx.beginPath();
    ctx.ellipse(0, 0, o.w * 0.55, 6, 0, 0, Math.PI*2);
    ctx.fill();
    // body
    ctx.fillStyle = '#FF9758';
    ctx.beginPath();
    ctx.moveTo(-o.w * 0.42, 0);
    ctx.lineTo(o.w * 0.42, 0);
    ctx.lineTo(o.w * 0.12, -o.h);
    ctx.lineTo(-o.w * 0.12, -o.h);
    ctx.closePath();
    ctx.fill();
    // white stripe
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.beginPath();
    ctx.moveTo(-o.w * 0.32, -o.h * 0.42);
    ctx.lineTo(o.w * 0.32, -o.h * 0.42);
    ctx.lineTo(o.w * 0.26, -o.h * 0.55);
    ctx.lineTo(-o.w * 0.26, -o.h * 0.55);
    ctx.closePath();
    ctx.fill();
    // tip
    ctx.fillStyle = '#E6792E';
    ctx.beginPath();
    ctx.ellipse(0, -o.h, o.w * 0.13, 4, 0, 0, Math.PI*2);
    ctx.fill();
  } else if (o.type === 'ball') {
    // tennis ball
    ctx.fillStyle = '#FFD34D';
    ctx.beginPath();
    ctx.arc(0, -o.h/2, o.w/2, 0, Math.PI*2);
    ctx.fill();
    // shading
    ctx.fillStyle = 'rgba(244, 184, 51, 0.55)';
    ctx.beginPath();
    ctx.arc(o.w * 0.1, -o.h/2 + o.w * 0.08, o.w/2, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255, 255, 200, 0.6)';
    ctx.beginPath();
    ctx.arc(-o.w * 0.18, -o.h/2 - o.w * 0.18, o.w * 0.18, 0, Math.PI*2);
    ctx.fill();
    // curves
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(0, -o.h/2, o.w/2 - 2, -Math.PI * 0.85, -Math.PI * 0.15);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(0, -o.h/2, o.w/2 - 2, Math.PI * 0.15, Math.PI * 0.85);
    ctx.stroke();
  } else if (o.type === 'net') {
    // posts
    ctx.fillStyle = '#5BC0EB';
    ctx.fillRect(-o.w/2 - 2, -o.h, 4, o.h);
    ctx.fillRect(o.w/2 - 2, -o.h, 4, o.h);
    // top band
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(-o.w/2, -o.h, o.w, 8);
    // mesh
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.85)';
    ctx.lineWidth = 1.2;
    for (let i = 0; i < 6; i++) {
      ctx.beginPath();
      ctx.moveTo(-o.w/2 + i * (o.w/5), -o.h + 8);
      ctx.lineTo(-o.w/2 + i * (o.w/5), 0);
      ctx.stroke();
    }
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.moveTo(-o.w/2, -o.h + 8 + i * ((o.h - 8)/4));
      ctx.lineTo(o.w/2, -o.h + 8 + i * ((o.h - 8)/4));
      ctx.stroke();
    }
  } else if (o.type === 'basket') {
    // metal basket of tennis balls
    ctx.fillStyle = '#9AA3AE';
    ctx.fillRect(-o.w/2, -o.h * 0.25, o.w, o.h * 0.25);
    // balls inside
    for (let i = 0; i < 3; i++) {
      ctx.fillStyle = '#FFD34D';
      ctx.beginPath();
      ctx.arc(-o.w/3 + i * o.w/3, -o.h * 0.45, 14, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(-o.w/3 + i * o.w/3, -o.h * 0.45, 12, -Math.PI * 0.6, -Math.PI * 0.2);
      ctx.stroke();
    }
    // wire pattern
    ctx.strokeStyle = '#6B7480';
    ctx.lineWidth = 1.2;
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.moveTo(-o.w/2 + i * (o.w/4), -o.h * 0.25);
      ctx.lineTo(-o.w/2 + i * (o.w/4), 0);
      ctx.stroke();
    }
    // legs
    ctx.fillStyle = '#7B848E';
    ctx.fillRect(-o.w/2 + 4, 0, 5, 4);
    ctx.fillRect(o.w/2 - 9, 0, 5, 4);
  } else if (o.type === 'hurdle') {
    // posts
    ctx.fillStyle = '#5BC0EB';
    ctx.fillRect(-o.w/2 - 3, -o.h, 6, o.h);
    ctx.fillRect(o.w/2 - 3, -o.h, 6, o.h);
    // top bar
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(-o.w/2 - 6, -o.h - 3, o.w + 12, 14);
    ctx.fillStyle = '#FF9758';
    ctx.fillRect(-o.w/2 - 6, -o.h + 4, o.w + 12, 4);
    // base feet
    ctx.fillStyle = '#3FA3CF';
    ctx.fillRect(-o.w/2 - 8, -3, 16, 6);
    ctx.fillRect(o.w/2 - 8, -3, 16, 6);
  }
  ctx.restore();
}

/* ─── Particles (stars on score / dust on jump) ─────────────────────────── */
function spawnDust(x, y) {
  for (let i = 0; i < 6; i++) {
    state.particles.push({
      x, y, vx: -120 - Math.random() * 80, vy: -60 - Math.random() * 80,
      g: 320, life: 0.5, age: 0, type: 'dust', size: 4 + Math.random() * 3
    });
  }
}
function spawnStar(x, y) {
  for (let i = 0; i < 8; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 120 + Math.random() * 180;
    state.particles.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 80,
      g: 280, life: 0.9, age: 0, type: 'star', size: 6 + Math.random() * 4,
      rot: Math.random() * Math.PI, vr: (Math.random() - 0.5) * 8
    });
  }
}
function drawParticles(dt) {
  for (let i = state.particles.length - 1; i >= 0; i--) {
    const p = state.particles[i];
    p.age += dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += p.g * dt;
    if (p.rot !== undefined) p.rot += p.vr * dt;
    const a = 1 - (p.age / p.life);
    if (p.age >= p.life) { state.particles.splice(i, 1); continue; }
    if (p.type === 'dust') {
      ctx.fillStyle = `rgba(168, 224, 99, ${a * 0.7})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * a, 0, Math.PI*2);
      ctx.fill();
    } else if (p.type === 'star') {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = `rgba(255, 211, 77, ${a})`;
      drawStarShape(0, 0, p.size, p.size * 0.5, 5);
      ctx.fill();
      ctx.restore();
    }
  }
}
function drawStarShape(cx, cy, outerR, innerR, points) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const a = (i * Math.PI) / points - Math.PI / 2;
    const x = cx + Math.cos(a) * r;
    const y = cy + Math.sin(a) * r;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
}

/* ─── Beat pulse FX ─────────────────────────────────────────────────────── */
let lastBeatIdx = -1;
const beatGlow = document.getElementById('beat-glow');
function checkBeatPulse() {
  // Find current/just-passed beat
  for (let i = lastBeatIdx + 1; i < BEATS.length; i++) {
    if (BEATS[i] <= state.songTime + 0.04 && BEATS[i] >= state.songTime - 0.06) {
      lastBeatIdx = i;
      pulseBeat();
      break;
    } else if (BEATS[i] > state.songTime + 0.04) break;
  }
}
function pulseBeat() {
  beatGlow.classList.add('hit');
  setTimeout(() => beatGlow.classList.remove('hit'), 80);
}

/* ─── Game loop ─────────────────────────────────────────────────────────── */
let lastTime = 0;
function loop(now) {
  const dt = Math.min(0.05, (now - lastTime) / 1000 || 0);
  lastTime = now;

  // Sync to music
  if (state.scene === 'playing' && !music.paused) {
    state.songTime = music.currentTime;
    // ramp speed
    state.speed = Math.min(MAX_SPEED, BASE_SPEED + state.songTime * SPEED_RAMP);
    update(dt);
  }
  render(dt);
  requestAnimationFrame(loop);
}

function update(dt) {
  const p = state.player;

  // physics
  p.vy += GRAVITY * dt;
  p.y += p.vy * dt;
  if (p.y >= GROUND_Y) {
    if (!p.onGround) {
      p.onGround = true;
      p.scaleX = 1.18; p.scaleY = 0.82;
      sfx('land');
    }
    p.y = GROUND_Y;
    p.vy = 0;
  } else {
    p.onGround = false;
  }

  // buffered jump
  const nowMs = performance.now();
  if (state.jumpBufferAt > 0 && (nowMs - state.jumpBufferAt) < BUFFER_MS && p.onGround) {
    doJump();
    state.jumpBufferAt = -1;
  }

  // spawn obstacles — toddler-friendly: skip beats too early to spawn
  // properly (travel time would be negative). Give 4s warm-up before
  // first obstacle reaches player so kids have time to settle in.
  const WARMUP = 4.0;
  while (state.obstacleIdx < BEATS.length) {
    const beat = BEATS[state.obstacleIdx];
    const wantSpawn = OBSTACLE_PATTERN[state.obstacleIdx % OBSTACLE_PATTERN.length] === 1;
    const travel = (SPAWN_LEAD_X - PLAYER_X) / state.speed;
    if (beat < WARMUP) { state.obstacleIdx++; continue; }
    if (state.songTime >= beat - travel) {
      if (wantSpawn) spawnObstacle(beat);
      state.obstacleIdx++;
    } else {
      break;
    }
  }

  // move obstacles
  for (let i = state.obstacles.length - 1; i >= 0; i--) {
    const o = state.obstacles[i];
    o.x -= state.speed * dt;
    // passed
    if (!o.passed && o.x + o.w/2 < PLAYER_X - 30) {
      o.passed = true;
      state.score += 10;
      state.combo++;
      state.bestCombo = Math.max(state.bestCombo, state.combo);
      // star bonus on combo milestones
      if (state.combo > 0 && state.combo % 3 === 0) {
        state.stars++;
        sfx('star');
        spawnStar(PLAYER_X, GROUND_Y - 80);
        showCombo(`${state.combo}× COMBO!`, '+1 ⭐');
      } else if (state.combo === 1) {
        sfx('tick');
      }
      updateHud();
    }
    // collision
    if (!o.passed && rectsOverlap(o)) {
      gameOver();
      return;
    }
    if (o.x < -100) state.obstacles.splice(i, 1);
  }

  checkBeatPulse();
}

function rectsOverlap(o) {
  // Player hitbox — generous on edges, tighter at top so jumps feel rewarding.
  // Toddler-friendly: only count overlap on the lower body / running stride.
  const px1 = PLAYER_X - 26;
  const px2 = PLAYER_X + 26;
  const py1 = state.player.y - 95;
  const py2 = state.player.y - 4;
  // Obstacle hitbox — slightly smaller than visual bounds (forgiveness)
  const ox1 = o.x - o.w * 0.36;
  const ox2 = o.x + o.w * 0.36;
  const oy1 = o.y - o.h + 8;
  const oy2 = o.y - 4;
  return px1 < ox2 && px2 > ox1 && py1 < oy2 && py2 > oy1;
}

function doJump() {
  const p = state.player;
  if (!p.onGround) return;
  p.vy = JUMP_V;
  p.onGround = false;
  p.scaleX = 0.85; p.scaleY = 1.18;
  p.jumpTime = state.songTime;
  sfx('jump');
  spawnDust(PLAYER_X - 20, GROUND_Y - 4);
  // perfect-beat bonus
  let nearestBeat = Infinity;
  for (const b of BEATS) {
    const d = Math.abs(b - state.songTime);
    if (d < nearestBeat) nearestBeat = d;
    if (b > state.songTime + 0.5) break;
  }
  if (nearestBeat < 0.12) {
    showCombo('PERFECT!', 'on the beat 🎵');
    if (navigator.vibrate) navigator.vibrate(15);
  }
}

function render(dt) {
  ctx.save();
  // clear
  ctx.fillStyle = '#F6F9F3';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.translate(offsetX, offsetY);
  ctx.scale(scale, scale);

  drawBackground(dt);
  state.obstacles.forEach(drawObstacle);
  drawPlayer(dt);
  drawParticles(dt);

  ctx.restore();
}

/* ─── Game flow ─────────────────────────────────────────────────────────── */
function startGame() {
  ensureAudio();
  state.scene = 'playing';
  state.score = 0;
  state.stars = 0;
  state.combo = 0;
  state.bestCombo = 0;
  state.speed = BASE_SPEED;
  state.songTime = 0;
  state.obstacleIdx = 0;
  state.obstacles = [];
  state.particles = [];
  state.player = { y: GROUND_Y, vy: 0, onGround: true, scaleX: 1, scaleY: 1, jumpTime: 0 };
  lastBeatIdx = -1;
  music.currentTime = 0;
  music.play().catch(()=>{});
  hide('home'); hide('pause'); hide('gameover');
  updateHud();
  showTapHint();
}

function gameOver() {
  state.scene = 'over';
  music.pause();
  sfx('oops');
  if (navigator.vibrate) navigator.vibrate([20, 40, 20]);
  // little sad squash
  state.player.scaleX = 1.25; state.player.scaleY = 0.75;
  // save best
  try {
    const prev = parseInt(localStorage.getItem('babymo_best') || '0', 10);
    if (state.score > prev) localStorage.setItem('babymo_best', state.score);
    state.bestScore = Math.max(prev, state.score);
  } catch(e) { state.bestScore = Math.max(state.bestScore, state.score); }
  // populate panel
  document.getElementById('go-score').textContent = state.score;
  document.getElementById('go-stars').textContent = '⭐ ' + state.stars;
  document.getElementById('go-best').textContent = state.bestScore;
  // encouraging message
  const msgs = [
    ['Great Job!', "Let's try again? 💚"],
    ['Nice run!', "Wanna go further? 🎾"],
    ['You did it!', "One more try? ✨"],
    ['So close!', "I bet you can do better! 💪"],
    ['Way to go!', "Tap replay to keep grooving 🎵"]
  ];
  const m = msgs[Math.min(msgs.length - 1, Math.floor(state.score / 60))];
  document.getElementById('go-title').textContent = m[0];
  document.getElementById('go-sub').textContent = m[1];
  setTimeout(() => show('gameover'), 700);
}

function pauseGame() {
  if (state.scene !== 'playing') return;
  state.scene = 'paused';
  music.pause();
  show('pause');
}
function resumeGame() {
  if (state.scene !== 'paused') return;
  state.scene = 'playing';
  music.play().catch(()=>{});
  hide('pause');
}
function quitToHome() {
  state.scene = 'home';
  music.pause();
  music.currentTime = 0;
  hide('pause'); hide('gameover');
  show('home');
}

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

function updateHud() {
  document.getElementById('score-num').textContent = state.score;
  document.getElementById('stars-num').textContent = '⭐ ' + state.stars;
}

function showCombo(text, small) {
  const el = document.getElementById('combo');
  el.innerHTML = text + (small ? `<span class="small">${small}</span>` : '');
  el.classList.remove('show');
  // force reflow to restart animation
  void el.offsetWidth;
  el.classList.add('show');
}

let tapHintShown = false;
function showTapHint() {
  if (tapHintShown) return;
  tapHintShown = true;
  document.getElementById('tap-hint').classList.add('visible');
  setTimeout(() => document.getElementById('tap-hint').classList.remove('visible'), 4000);
}

/* ─── Input handling ────────────────────────────────────────────────────── */
function onTap(e) {
  if (e && e.target && e.target.closest('button, .icon-btn')) return;
  if (state.scene === 'playing') {
    if (state.player.onGround) doJump();
    else state.jumpBufferAt = performance.now();
  }
}
document.getElementById('frame').addEventListener('pointerdown', onTap, { passive: true });
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    e.preventDefault();
    onTap();
  } else if (e.code === 'KeyP') {
    if (state.scene === 'playing') pauseGame();
    else if (state.scene === 'paused') resumeGame();
  }
});

document.getElementById('start-btn').addEventListener('click', () => {
  ensureAudio();
  // load best score
  try { state.bestScore = parseInt(localStorage.getItem('babymo_best') || '0', 10); } catch(e) {}
  startGame();
});
document.getElementById('replay-btn').addEventListener('click', startGame);
document.getElementById('home-btn').addEventListener('click', quitToHome);
document.getElementById('resume-btn').addEventListener('click', resumeGame);
document.getElementById('quit-btn').addEventListener('click', quitToHome);
document.getElementById('pause-btn').addEventListener('click', () => {
  if (state.scene === 'playing') pauseGame();
  else if (state.scene === 'paused') resumeGame();
});
document.getElementById('sound-btn').addEventListener('click', () => {
  state.soundOn = !state.soundOn;
  music.muted = !state.soundOn;
  document.getElementById('sound-btn').textContent = state.soundOn ? '🔊' : '🔇';
});

// Prevent default touch behaviors
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
document.addEventListener('gesturestart', e => e.preventDefault());

/* ─── Start ─────────────────────────────────────────────────────────────── */
resize();
requestAnimationFrame(loop);
</script>
</body>
</html>
