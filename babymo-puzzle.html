<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="description" content="Kenalan dengan Baby Mo! — Puzzle interaktif untuk anak">
<title>👋 Kenalan dengan Baby Mo!</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  /* ── FRESH KID PALETTE — BabyMo.id inspired ── */
  --bg:#07200E;--bg2:#0A2A14;
  --card:#0E2E16;--card2:#143820;
  --green:#18A84E;--green-lt:#22C85E;--green-glow:#40E878;
  --gold:#FFB830;--gold-lt:#FFD04A;
  --cream:#FFFBF0;--cream-dim:#B0C4B8;
  --orange:#F47C3C;--coral:#FF6B5E;
  --teal:#00C8A0;--sky:#4DD8F0;
  --purple:#9B6FE8;
  --border:rgba(64,232,120,.18);
  /* Tile accent colors — one per tile */
  --t0:#FF6B5E;--t1:#F47C3C;--t2:#FFB830;
  --t3:#18A84E;--t4:#00C8A0;--t5:#4DD8F0;
  --t6:#9B6FE8;--t7:#F47C3C;--t8:#FF6B5E;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
html,body{width:100%;height:100%;overflow:hidden;
  background:radial-gradient(ellipse 100% 70% at 50% 0%,#0D3A1A,#07200E 60%);
  font-family:'Nunito',sans-serif;color:var(--cream);}

/* Animated gradient bg */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 10% 10%,rgba(24,168,78,.18),transparent),
    radial-gradient(ellipse 70% 50% at 90% 90%,rgba(244,124,60,.12),transparent),
    radial-gradient(ellipse 50% 40% at 50% 50%,rgba(0,200,160,.07),transparent);
}

/* ── STARFIELD ── */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
#stars i{position:absolute;font-style:normal;animation:starAnim var(--d,3s) var(--dl,0s) ease-in-out infinite;color:var(--gold);opacity:.1;}
@keyframes starAnim{0%,100%{opacity:.06;transform:scale(.8)}50%{opacity:.28;transform:scale(1.4)}}

/* ── MAIN LAYOUT ── */
.page{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;align-items:center;
  justify-content:space-between;padding:env(safe-area-inset-top,12px) 0 env(safe-area-inset-bottom,16px);overflow:hidden;}

/* ── HEADER ── */
.hdr{width:100%;max-width:420px;display:flex;align-items:center;justify-content:space-between;padding:14px 20px 8px;flex-shrink:0;}
.hdr-back{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  border-radius:14px;padding:8px 14px;font-size:12px;font-weight:800;color:var(--cream);
  text-decoration:none;transition:.15s;display:inline-flex;align-items:center;gap:5px;
  box-shadow:0 2px 10px rgba(0,0,0,.2);
}
.hdr-back:active{opacity:.7;transform:scale(.97);}
.counter-badge{
  background:linear-gradient(135deg,rgba(255,184,48,.2),rgba(255,208,74,.1));
  border:1.5px solid rgba(255,184,48,.4);
  border-radius:22px;padding:7px 15px;font-size:13px;font-weight:900;color:var(--gold-lt);
  display:flex;align-items:center;gap:6px;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 2px 12px rgba(255,184,48,.2);
}
.counter-badge.bump{animation:bump .35s cubic-bezier(.34,1.56,.64,1);}
@keyframes bump{0%{transform:scale(1)}50%{transform:scale(1.28) rotate(-3deg)}100%{transform:scale(1)}}

/* ── TITLE AREA ── */
.title-area{text-align:center;padding:0 20px 4px;flex-shrink:0;}
.mystery-label{font-size:10px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;
  color:rgba(255,255,255,.45);margin-bottom:5px;display:flex;align-items:center;justify-content:center;gap:8px;}
.mystery-label::before,.mystery-label::after{content:'';width:20px;height:1px;background:rgba(255,255,255,.15);}
.main-title{font-size:clamp(22px,6vw,30px);font-weight:900;color:var(--cream);line-height:1.15;transition:all .5s ease;}
.main-title span{color:var(--gold-lt);}
.sub-hint{font-size:13px;color:rgba(255,255,255,.5);margin-top:4px;font-weight:700;transition:opacity .4s;}

/* ── PUZZLE WRAP ── */
.puzzle-wrap{position:relative;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.puzzle-glow{position:absolute;border-radius:28px;opacity:0;transition:opacity .8s ease;pointer-events:none;}

/* ── GRID ── */
.grid{
  display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
  gap:5px;border-radius:24px;overflow:hidden;position:relative;z-index:1;
  background:rgba(255,255,255,.06);
  border:3px solid rgba(255,255,255,.12);
  box-shadow:0 12px 50px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.05);
  transition:box-shadow .5s ease;
}
.grid.complete{
  box-shadow:0 0 0 4px var(--gold),0 0 60px rgba(255,184,48,.5),0 12px 50px rgba(0,0,0,.4);
  animation:completePulse 1.5s ease-in-out infinite alternate;
}
@keyframes completePulse{
  from{box-shadow:0 0 0 3px var(--gold),0 0 40px rgba(255,184,48,.4);}
  to{box-shadow:0 0 0 6px var(--gold-lt),0 0 80px rgba(255,208,74,.6);}
}

/* ── TILE ── */
.tile{position:relative;cursor:pointer;perspective:700px;}
.tile-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,.2,.2,1);}
.tile.flipped .tile-inner{transform:rotateY(180deg);}
.tile-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;align-items:center;justify-content:center;overflow:hidden;}

/* BACK face — colourful per-tile */
.tile-back{background:var(--tc,#1a3020);border:none;}
.tile-back::before{content:'';position:absolute;inset:0;
  background:linear-gradient(145deg,rgba(255,255,255,.18) 0%,transparent 60%);pointer-events:none;}
.tile-back::after{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 80% at 30% 20%,rgba(255,255,255,.12),transparent 60%);pointer-events:none;}
.tile-back-icon{font-size:28px;position:relative;z-index:1;
  animation:iconBounce var(--df,2.5s) var(--dfl,0s) cubic-bezier(.45,.05,.55,.95) infinite;
  text-shadow:0 2px 8px rgba(0,0,0,.3);}
@keyframes iconBounce{
  0%,100%{transform:translateY(0) scale(1) rotate(-3deg);}
  30%{transform:translateY(-6px) scale(1.12) rotate(3deg);}
  60%{transform:translateY(-2px) scale(1.05) rotate(-1deg);}
}

/* FRONT face — image tile */
.tile-front{transform:rotateY(180deg);background-color:#F2EEE5;background-repeat:no-repeat;}
.tile-front::after{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 50%);pointer-events:none;}
.tile.just-revealed .tile-front::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50%,rgba(255,255,255,.65),transparent 68%);
  animation:revealShine .8s ease forwards;}
@keyframes revealShine{0%{opacity:1}100%{opacity:0}}

/* ── SPARKLES ── */
.spark{position:fixed;pointer-events:none;z-index:100;font-size:var(--sz,16px);
  animation:sparkFly var(--dur,0.8s) ease forwards;transform-origin:center;}
@keyframes sparkFly{
  0%{opacity:1;transform:translate(0,0) scale(1.2) rotate(0deg);}
  100%{opacity:0;transform:translate(var(--tx,20px),var(--ty,-50px)) scale(.1) rotate(var(--tr,180deg));}
}

/* ── FLOATING PARTICLES ── */
.float-p{position:fixed;pointer-events:none;z-index:2;
  animation:pFloat var(--pd,4s) var(--pdl,0s) ease-in-out infinite alternate;
  font-size:var(--ps,14px);opacity:.25;}
@keyframes pFloat{from{transform:translateY(0) rotate(-5deg)}to{transform:translateY(-20px) rotate(5deg)}}

/* ── CELEBRATION OVERLAY ── */
#celebOverlay{position:fixed;inset:0;z-index:50;pointer-events:none;opacity:0;transition:opacity .5s ease;}
#celebOverlay.show{opacity:1;pointer-events:all;}
.celeb-bg{
  position:absolute;inset:0;
  background:linear-gradient(175deg,rgba(7,32,14,.9) 0%,rgba(10,42,20,.96) 100%);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}

/* Intro card — rises from bottom */
.intro-card{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(170deg,#0D3018 0%,#082010 50%,#0A2A14 100%);
  border-radius:32px 32px 0 0;
  border-top:2.5px solid rgba(255,184,48,.35);
  padding:0 24px 44px;
  transform:translateY(100%);
  transition:transform .65s cubic-bezier(.34,1.56,.64,1);
  overflow:hidden;
}
.intro-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:200px;
  background:radial-gradient(ellipse at 50% 0%,rgba(255,184,48,.12),transparent 70%);
  pointer-events:none;
}
.intro-card.show{transform:translateY(0);}

/* ── BABY MO DANCE ──
   Stays ABOVE the text — positioned in its own section */
.mo-stage{
  display:flex;justify-content:center;
  padding:0 0 4px;
  position:relative;
  margin-top:-16px;          /* pulls character up, overlapping card top edge slightly */
}
.mo-glow-ring{
  position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  width:100px;height:22px;
  background:radial-gradient(ellipse,rgba(255,184,48,.45),transparent 70%);
  border-radius:50%;
  animation:glowPulse 1.8s ease-in-out infinite alternate;
}
@keyframes glowPulse{from{opacity:.6;transform:translateX(-50%) scaleX(1)}to{opacity:1;transform:translateX(-50%) scaleX(1.3)}}

.mo-reveal-img{
  width:140px;height:140px;
  object-fit:contain;
  display:block;
  position:relative;z-index:1;
  filter:drop-shadow(0 12px 28px rgba(255,184,48,.5));
  animation:moDance 2.4s ease-in-out infinite;
  transform-origin:50% 92%;   /* pivot near feet for natural sway */
}
/* GENTLE DANCE — small sway, stays fully visible */
@keyframes moDance{
  0%  {transform:translateY(0px)  rotate(-2deg) scale(1);}
  20% {transform:translateY(-4px) rotate(-1deg) scale(1.02);}
  40% {transform:translateY(-5px) rotate(1deg)  scale(1.025);}
  60% {transform:translateY(-3px) rotate(2deg)  scale(1.02);}
  80% {transform:translateY(-1px) rotate(0deg)  scale(1.01);}
  100%{transform:translateY(0px)  rotate(-2deg) scale(1);}
}

/* Waving hand emoji animation */
.wave-hand{
  display:inline-block;
  transform-origin:70% 80%;
  animation:waveHand 1.4s ease-in-out infinite;
}
@keyframes waveHand{
  0%  {transform:rotate(0deg);}
  10% {transform:rotate(18deg);}
  20% {transform:rotate(-8deg);}
  30% {transform:rotate(18deg);}
  40% {transform:rotate(-4deg);}
  50% {transform:rotate(14deg);}
  60% {transform:rotate(0deg);}
  100%{transform:rotate(0deg);}
}

/* Content BELOW character — never touched by image */
.intro-content{
  position:relative;z-index:2;
  display:flex;flex-direction:column;
  align-items:center;
}

.intro-name{
  font-size:clamp(30px,9vw,44px);font-weight:900;
  color:var(--gold-lt);text-align:center;
  text-shadow:0 0 30px rgba(255,184,48,.5);
  margin-bottom:12px;line-height:1;
}

/* Speech bubble */
.speech-bubble{
  width:100%;
  background:rgba(255,255,255,.08);
  border:1.5px solid rgba(255,184,48,.3);
  border-radius:20px;padding:14px 18px;
  text-align:center;margin-bottom:14px;
}
.bubble-text{font-size:18px;font-weight:900;color:var(--cream);margin-bottom:3px;}
.bubble-sub{font-size:13px;color:rgba(255,255,255,.6);font-weight:700;}

/* Info pills */
.info-row{display:flex;gap:8px;justify-content:center;margin-bottom:18px;flex-wrap:wrap;}
.info-pill{
  padding:8px 14px;border-radius:22px;font-size:12px;font-weight:800;
  display:flex;align-items:center;gap:5px;
}
.pill-green{background:rgba(24,168,78,.25);border:1.5px solid rgba(24,168,78,.4);color:var(--green-glow);}
.pill-orange{background:rgba(244,124,60,.2);border:1.5px solid rgba(244,124,60,.35);color:#FFAA70;}
.pill-gold{background:rgba(255,184,48,.18);border:1.5px solid rgba(255,184,48,.35);color:var(--gold-lt);}

/* Play button */
.play-btn{
  width:100%;padding:18px;
  background:linear-gradient(135deg,#18A84E,#0E7C38);
  border:none;border-radius:18px;
  font-family:'Nunito',sans-serif;font-size:17px;font-weight:900;
  color:#fff;cursor:pointer;
  box-shadow:0 6px 28px rgba(24,168,78,.55),0 0 0 0 rgba(64,232,120,.0);
  display:flex;align-items:center;justify-content:center;gap:10px;
  text-decoration:none;
  animation:btnGlow 2.2s ease-in-out infinite;
}
@keyframes btnGlow{
  0%,100%{box-shadow:0 6px 28px rgba(24,168,78,.55);}
  50%{box-shadow:0 8px 38px rgba(24,168,78,.8),0 0 0 8px rgba(64,232,120,.12);}
}
.play-btn:active{transform:scale(.97);}

/* ── PROGRESS RING ── */
.prog-ring{position:relative;width:44px;height:44px;flex-shrink:0;}
.prog-ring svg{transform:rotate(-90deg);}
.prog-ring-bg{fill:none;stroke:rgba(255,255,255,.1);stroke-width:3.5;}
.prog-ring-fill{fill:none;stroke:var(--gold);stroke-width:3.5;stroke-linecap:round;
  stroke-dasharray:113;stroke-dashoffset:113;transition:stroke-dashoffset .5s ease;}
.prog-ring-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:900;color:var(--gold-lt);}

/* ── TOAST ── */
.toast{position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:linear-gradient(135deg,#18A84E,#0E7C38);
  border-radius:20px;padding:14px 24px;
  text-align:center;z-index:200;pointer-events:none;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 8px 30px rgba(0,0,0,.4);}
.toast.show{transform:translate(-50%,-50%) scale(1);}
.toast-e{font-size:30px;}
.toast-t{font-size:14px;font-weight:900;color:#fff;margin-top:3px;}

/* ── CONFETTI ── */
.conf{position:fixed;pointer-events:none;z-index:60;animation:confFall linear forwards;font-size:var(--cs,18px);}
@keyframes confFall{0%{transform:translateY(-30px) rotate(0);opacity:1;}80%{opacity:.9;}
  100%{transform:translateY(110vh) rotate(var(--cr,360deg));opacity:0;}}
.spark{position:fixed;pointer-events:none;z-index:100;font-size:var(--sz,16px);
  animation:sparkFly var(--dur,0.8s) ease forwards;}

</style>
</head>
<body>

<!-- Starfield -->
<div id="stars"></div>

<!-- Floating ambient particles -->
<div class="float-p" style="left:8%;top:20%;--pd:3.2s;--pdl:.5s;--ps:18px;">🌙</div>
<div class="float-p" style="right:10%;top:15%;--pd:2.8s;--pdl:1s;--ps:14px;">✦</div>
<div class="float-p" style="left:15%;bottom:30%;--pd:3.5s;--pdl:.2s;--ps:16px;">⭐</div>
<div class="float-p" style="right:8%;bottom:35%;--pd:2.6s;--pdl:.8s;--ps:12px;">✨</div>
<div class="float-p" style="left:5%;top:50%;--pd:4s;--pdl:.3s;--ps:10px;">◆</div>
<div class="float-p" style="right:5%;top:55%;--pd:3.8s;--pdl:1.2s;--ps:10px;">◆</div>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="toast-e" id="toastE">⭐</div>
  <div class="toast-t" id="toastT">Bagus!</div>
</div>

<!-- Main Page -->
<div class="page" id="mainPage">

  <!-- Header -->
  <div class="hdr">
    <a href="./index.html" class="hdr-back">← Game Hub</a>
    <!-- Progress ring -->
    <div class="prog-ring">
      <svg width="44" height="44" viewBox="0 0 44 44">
        <circle class="prog-ring-bg" cx="22" cy="22" r="18"/>
        <circle class="prog-ring-fill" id="ringFill" cx="22" cy="22" r="18"/>
      </svg>
      <div class="prog-ring-label" id="ringLabel">0</div>
    </div>
    <!-- Counter -->
    <div class="counter-badge" id="counter">
      <span id="countNum">0</span> / 9 🌟
    </div>
  </div>

  <!-- Title -->
  <div class="title-area">
    <div class="mystery-label">Kenalan dulu yuk!</div>
    <div class="main-title" id="mainTitle">Siapa <span>aku</span>? 🌟</div>
    <div class="sub-hint" id="subHint">Ketuk petak untuk membuka rahasia!</div>
  </div>

  <!-- Puzzle -->
  <div class="puzzle-wrap">
    <div class="puzzle-glow" id="puzzleGlow"></div>
    <div class="grid" id="grid"></div>
  </div>

  <!-- Bottom hint -->
  <div style="text-align:center;padding:0 20px;flex-shrink:0;">
    <div id="bottomHint" style="font-size:12px;color:var(--cream-dim);font-weight:700;min-height:20px;transition:all .4s;">
      👆 Ketuk petak yang belum terbuka
    </div>
  </div>

</div>

<!-- Celebration overlay -->
<div id="celebOverlay">
  <div class="celeb-bg"></div>

  <!-- Big name title (appears first) -->
  <div class="celeb-title" id="celebTitle">Baby Mo! 👋</div>

  <!-- Introduction card (slides up from bottom) -->
  <div class="intro-card" id="introCard">

    <!-- CHARACTER — own stage, NEVER overlaps text below -->

// Compute puzzle size based on viewport
const vw = Math.min(window.innerWidth, 420);
const PUZZLE_SIZE = Math.min(vw - 32, 340); // leave 16px each side, max 340
const TILE_SIZE = (PUZZLE_SIZE - (COLS - 1) * 4) / COLS; // 4px gaps

// Tile back icons — cycling
const BACK_ICONS = ['🌙','⭐','✨','🌿','💚','🌟','✦','🌸','☀️'];

// Musical notes — C major scale + two extra
const NOTES = [261, 294, 330, 349, 392, 440, 494, 523, 587];

// Celebration phrases at milestones
const HINTS = {
  3: '🌟 Sudah 3! Terus ya!',
  6: '🔥 Hampir ketemu! 3 lagi!',
  8: '💚 Satu lagi! Ayo!',
};

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let revealed = 0;
let audioCtx = null;

// ═══════════════════════════════════════════
// INIT STARFIELD
// ═══════════════════════════════════════════
(function initStars(){
  const bg = document.getElementById('stars');
  const glyphs = ['✦','·','✧','*','◆','★'];
  for(let i = 0; i < 50; i++){
    const s = document.createElement('i');
    s.textContent = glyphs[i % glyphs.length];
    s.style.cssText =
      `left:${Math.random()*98}%;top:${Math.random()*98}%;`+
      `font-size:${4+Math.random()*7}px;`+
      `--d:${2+Math.random()*4}s;--dl:${Math.random()*4}s;`;
    bg.appendChild(s);
  }
})();

// ═══════════════════════════════════════════
// BUILD GRID
// ═══════════════════════════════════════════
function buildGrid(){
  const grid = document.getElementById('grid');
  grid.style.width  = PUZZLE_SIZE + 'px';
  grid.style.height = PUZZLE_SIZE + 'px';

  // Glow layer
  const glow = document.getElementById('puzzleGlow');
  glow.style.cssText =
    `width:${PUZZLE_SIZE+60}px;height:${PUZZLE_SIZE+60}px;`+
    `background:radial-gradient(ellipse at 50%,rgba(200,144,64,.35),transparent 65%);`+
    `left:50%;top:50%;transform:translate(-50%,-50%);`;

  for(let r = 0; r < ROWS; r++){
    for(let c = 0; c < COLS; c++){
      const idx = r * COLS + c;
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.dataset.idx = idx;
      tile.style.width  = TILE_SIZE + 'px';
      tile.style.height = TILE_SIZE + 'px';

      const inner = document.createElement('div');
      inner.className = 'tile-inner';

      // BACK face
      const back = document.createElement('div');
      back.className = 'tile-face tile-back';
      const tileColors = ['#FF6B5E', '#F47C3C', '#FFB830', '#18A84E', '#00C8A0', '#4DD8F0', '#9B6FE8', '#F47C3C', '#FF6B5E'];
      back.style.setProperty('--tc', tileColors[idx] + '33');
      back.style.background = `linear-gradient(145deg, ${tileColors[idx]}55, ${tileColors[idx]}22)`;
      const icon = document.createElement('div');
      icon.className = 'tile-back-icon';
      icon.textContent = BACK_ICONS[idx];
      icon.style.cssText = `--df:${2+Math.random()}s;--dfl:${Math.random()*.8}s`;
      back.appendChild(icon);

      // FRONT face (image portion)
      const front = document.createElement('div');
      front.className = 'tile-face tile-front';
      // Each tile shows a portion of the full image
      // background-size = PUZZLE_SIZE (fit full image into puzzle area)
      // background-position offsets to show just this tile's region
      // Since image is square and puzzle is square, image fills exactly
      const bx = -(c * (TILE_SIZE + 4)); // +4 for gap
      const by = -(r * (TILE_SIZE + 4));
      front.style.backgroundImage  = `url('${IMG_SRC}')`;
      front.style.backgroundSize   = `${PUZZLE_SIZE}px ${PUZZLE_SIZE}px`;
      front.style.backgroundPosition = `${bx}px ${by}px`;

      inner.appendChild(back);
      inner.appendChild(front);
      tile.appendChild(inner);
      grid.appendChild(tile);

      // Events
      tile.addEventListener('click', () => onTileTap(tile, idx, r, c));
      tile.addEventListener('touchend', e => {
        e.preventDefault();
        onTileTap(tile, idx, r, c);
      }, { passive: false });
    }
  }
}

// ═══════════════════════════════════════════
// TAP HANDLER
// ═══════════════════════════════════════════
function onTileTap(tile, idx, r, c){
  if(tile.classList.contains('flipped')) return;

  // Flip
  tile.classList.add('flipped', 'just-revealed');
  setTimeout(() => tile.classList.remove('just-revealed'), 900);
  revealed++;

  // Sound
  playNote(NOTES[Math.min(idx, NOTES.length - 1)]);
  playSparkle();
  vib(40);

  // Sparkles from tile center
  const rect = tile.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top  + rect.height / 2;
  spawnSparkles(cx, cy, 10);

  // Counter update
  updateCounter();

  // Hint messages
  if(HINTS[revealed]){
    showBottomHint(HINTS[revealed]);
  }

  // Milestones
  if(revealed === 3){
    showToast('🌟', 'Bagus sekali!');
  } else if(revealed === 6){
    showToast('🔥', 'Hampir ketemu!');
    // Pulse the grid
    document.getElementById('grid').style.transform = 'scale(1.02)';
    setTimeout(() => document.getElementById('grid').style.transform = '', 300);
  }

  // Complete
  if(revealed === TOTAL){
    setTimeout(() => onComplete(), 700);
  }
}

// ═══════════════════════════════════════════
// COUNTER + RING UPDATE
// ═══════════════════════════════════════════
function updateCounter(){
  document.getElementById('countNum').textContent = revealed;
  // Ring circumference = 2π×18 ≈ 113
  const offset = 113 - (revealed / TOTAL) * 113;
  document.getElementById('ringFill').style.strokeDashoffset = offset;
  document.getElementById('ringLabel').textContent = revealed;
  // Bump animation
  const c = document.getElementById('counter');
  c.classList.remove('bump');
  void c.offsetWidth; // reflow
  c.classList.add('bump');

  // Color ring gold when complete
  if(revealed === TOTAL){
    document.getElementById('ringFill').style.stroke = '#6DB882';
  }
}

// ═══════════════════════════════════════════
// COMPLETION
// ═══════════════════════════════════════════
function onComplete(){
  vib([80,40,120,40,160]);
  // Grid gets gold border
  document.getElementById('grid').classList.add('complete');
  document.getElementById('puzzleGlow').style.opacity = '1';

  // Title changes
  document.getElementById('mainTitle').innerHTML = 'Ketemu! <span>Baby Mo!</span> 🎉';
  document.getElementById('subHint').style.opacity = '0';
  showBottomHint('');

  // Big confetti shower
  for(let i = 0; i < 60; i++){
    setTimeout(() => dropConfetti(), i * 55);
  }

  // Play celebratory fanfare
  playCelebration();

  // Show overlay after 900ms
  setTimeout(() => {
    const ov = document.getElementById('celebOverlay');
    ov.classList.add('show');
    // Slide in intro card 400ms later
    setTimeout(() => {
      document.getElementById('introCard').classList.add('show');
      playMoReveal();
    }, 500);
  }, 900);
}

// ═══════════════════════════════════════════
// SPARKLES
// ═══════════════════════════════════════════
const SPARK_GLYPHS = ['✨','⭐','🌟','✦','💛','💚','🌙','◆','★','•'];
function spawnSparkles(cx, cy, count){
  for(let i = 0; i < count; i++){
    setTimeout(() => {
      const s = document.createElement('div');
      s.className = 'spark';
      const angle = (Math.random() * 360) * Math.PI / 180;
      const dist  = 30 + Math.random() * 60;
      const tx    = Math.cos(angle) * dist;
      const ty    = Math.sin(angle) * dist - 20;
      const sz    = 10 + Math.random() * 16;
      const dur   = 0.5 + Math.random() * 0.5;
      const rot   = (-180 + Math.random() * 360);
      s.textContent = SPARK_GLYPHS[Math.floor(Math.random() * SPARK_GLYPHS.length)];
      s.style.cssText =
        `left:${cx}px;top:${cy}px;`+
        `--sz:${sz}px;--tx:${tx}px;--ty:${ty}px;`+
        `--tr:${rot}deg;--dur:${dur}s;`;
      document.body.appendChild(s);
      setTimeout(() => s.remove(), dur * 1000 + 100);
    }, i * 35);
  }
}

// ═══════════════════════════════════════════
// CONFETTI
// ═══════════════════════════════════════════
const CONF_GLYPHS = ['⭐','🌟','✨','💚','🌙','✦','🎉','🌸','💛','🤩'];
function dropConfetti(){
  const c = document.createElement('div');
  c.className = 'conf';
  const dur = 2 + Math.random() * 2.5;
  const rot = 180 + Math.floor(Math.random() * 540);
  c.textContent = CONF_GLYPHS[Math.floor(Math.random() * CONF_GLYPHS.length)];
  c.style.cssText =
    `left:${Math.random() * 100}vw;top:-30px;`+
    `--cs:${12+Math.random()*14}px;--cr:${rot}deg;`+
    `animation-duration:${dur}s;animation-delay:${Math.random()*0.5}s;`;
  document.body.appendChild(c);
  setTimeout(() => c.remove(), (dur + 0.5) * 1000);
}

// ═══════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════
function getCtx(){
  if(!audioCtx){
    try{ audioCtx = new(window.AudioContext || window.webkitAudioContext)(); }
    catch(e){}
  }
  return audioCtx;
}
function playNote(freq){
  const ctx = getCtx(); if(!ctx) return;
  try{
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    const f = ctx.createBiquadFilter();
    f.type = 'lowpass'; f.frequency.value = 1200;
    o.type = 'sine'; o.frequency.value = freq;
    o.connect(f); f.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0, ctx.currentTime);
    g.gain.linearRampToValueAtTime(0.28, ctx.currentTime + 0.04);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);
    o.start(ctx.currentTime);
    o.stop(ctx.currentTime + 0.45);
  }catch(e){}
}

/* Sparkle "tinkle" on every tile tap — bright freq sweep */
function playSparkle(){
  const ctx = getCtx(); if(!ctx) return;
  try{
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(1400, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(2800, ctx.currentTime + 0.06);
    o.frequency.exponentialRampToValueAtTime(2000, ctx.currentTime + 0.18);
    g.gain.setValueAtTime(0.18, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);
    o.connect(g); g.connect(ctx.destination);
    o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.22);
  }catch(e){}
}

/* Magic sparkle cascade when Baby Mo appears on card slide-in */
function playMoReveal(){
  const ctx = getCtx(); if(!ctx) return;
  // Ascending glittery arpeggio: C5→E5→G5→C6→E6→G6
  const notes = [523, 659, 784, 1047, 1319, 1568];
  notes.forEach((freq, i) => {
    setTimeout(() => {
      try{
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = 'sine';
        o.frequency.setValueAtTime(freq, ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(freq * 1.5, ctx.currentTime + 0.08);
        g.gain.setValueAtTime(0.22, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
        o.connect(g); g.connect(ctx.destination);
        o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.3);
      }catch(e){}
    }, i * 85);
  });
}

function playCelebration(){
  const ctx = getCtx(); if(!ctx) return;
  const chord = [261,330,392,523]; // C major chord
  chord.forEach((f, i) => {
    setTimeout(() => playNote(f), i * 60);
  });
  setTimeout(() => {
    [523,659,784,1046].forEach((f,i) => setTimeout(() => playNote(f), i*110));
  }, 400);
}

function vib(p){
  try{ navigator.vibrate && navigator.vibrate(p||40); }catch(e){}
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
let toastTimer;
function showToast(e, t){
  clearTimeout(toastTimer);
  document.getElementById('toastE').textContent = e;
  document.getElementById('toastT').textContent = t;
  const el = document.getElementById('toast');
  el.classList.add('show');
  toastTimer = setTimeout(() => el.classList.remove('show'), 1500);
}

// ═══════════════════════════════════════════
// BOTTOM HINT
// ═══════════════════════════════════════════
let hintTimer;
function showBottomHint(msg){
  clearTimeout(hintTimer);
  const el = document.getElementById('bottomHint');
  el.style.opacity = '0';
  el.style.transform = 'translateY(6px)';
  setTimeout(() => {
    el.textContent = msg;
    el.style.opacity = '1';
    el.style.transform = 'translateY(0)';
    el.style.transition = 'all .4s cubic-bezier(.34,1.56,.64,1)';
  }, 200);
  if(msg){
    hintTimer = setTimeout(() => {
      el.style.opacity = '0';
    }, 2500);
  }
}
