
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="description" content="Kenalan dengan Baby Mo! — Puzzle interaktif untuk anak">
<title>👋 Kenalan dengan Baby Mo!</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B1C12;--bg2:#0F2016;
  --card:#162014;
  --green:#2C5A3E;--green-lt:#4A8860;--green-glow:#6DB882;
  --gold:#C89040;--gold-lt:#E8B060;
  --cream:#F0E8D8;--cream-dim:#7A8078;
  --orange:#E8823A;
  --border:rgba(93,170,120,.14);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Nunito',sans-serif;color:var(--cream);}
 
/* ── AMBIENT ── */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 50% at 20% 15%,rgba(44,90,62,.25),transparent),
    radial-gradient(ellipse 60% 40% at 80% 85%,rgba(200,144,64,.09),transparent);
}
 
/* ── STARFIELD ── */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
#stars i{
  position:absolute;font-style:normal;
  animation:starAnim var(--d,3s) var(--dl,0s) ease-in-out infinite;
  color:var(--gold);opacity:.07;
}
@keyframes starAnim{0%,100%{opacity:.04;transform:scale(.8)}50%{opacity:.22;transform:scale(1.3)}}
 
/* ── MAIN LAYOUT ── */
.page{
  position:fixed;inset:0;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  justify-content:space-between;
  padding:env(safe-area-inset-top,12px) 0 env(safe-area-inset-bottom,16px);
  overflow:hidden;
}
 
/* ── HEADER ── */
.hdr{
  width:100%;max-width:420px;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 8px;flex-shrink:0;
}
.hdr-back{
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.1);
  border-radius:12px;padding:7px 13px;
  font-size:12px;font-weight:800;color:var(--cream-dim);
  text-decoration:none;transition:.15s;display:inline-flex;align-items:center;gap:5px;
}
.hdr-back:active{opacity:.7;}
.counter-badge{
  background:rgba(200,144,64,.12);
  border:1px solid rgba(200,144,64,.25);
  border-radius:20px;padding:6px 14px;
  font-size:13px;font-weight:900;color:var(--gold-lt);
  display:flex;align-items:center;gap:6px;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1);
}
.counter-badge.bump{animation:bump .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes bump{0%{transform:scale(1)}50%{transform:scale(1.22)}100%{transform:scale(1)}}
 
/* ── TITLE AREA ── */
.title-area{text-align:center;padding:0 20px 6px;flex-shrink:0;}
.mystery-label{
  font-size:10px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--cream-dim);margin-bottom:5px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.mystery-label::before,.mystery-label::after{content:'';width:20px;height:1px;background:var(--border);}
.main-title{
  font-size:clamp(22px,6vw,30px);font-weight:900;
  color:var(--cream);line-height:1.15;
  transition:all .5s ease;
}
.main-title span{color:var(--gold-lt);}
.sub-hint{
  font-size:13px;color:var(--cream-dim);margin-top:4px;
  transition:opacity .4s;
}
 
/* ── PUZZLE WRAP ── */
.puzzle-wrap{
  position:relative;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
 
/* Glow ring behind puzzle */
.puzzle-glow{
  position:absolute;
  border-radius:24px;
  opacity:0;transition:opacity .8s ease;
  pointer-events:none;
}
 
/* ── PUZZLE GRID ── */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  gap:4px;
  background:rgba(200,144,64,.12);
  border-radius:20px;
  border:2.5px solid rgba(200,144,64,.2);
  overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.5);
  position:relative;z-index:1;
  transition:box-shadow .5s ease;
}
.grid.complete{
  box-shadow:0 0 0 4px var(--gold), 0 0 50px rgba(200,144,64,.4), 0 8px 40px rgba(0,0,0,.4);
  animation:completePulse 1.5s ease-in-out infinite alternate;
}
@keyframes completePulse{
  from{box-shadow:0 0 0 3px var(--gold),0 0 40px rgba(200,144,64,.35);}
  to{box-shadow:0 0 0 5px var(--gold-lt),0 0 70px rgba(232,176,96,.55);}
}
 
/* ── SINGLE TILE ── */
.tile{
  position:relative;
  cursor:pointer;
  perspective:600px;
  /* Size set by JS based on viewport */
}
.tile-inner{
  position:relative;width:100%;height:100%;
  transform-style:preserve-3d;
  transition:transform .55s cubic-bezier(.4,.2,.2,1);
}
.tile.flipped .tile-inner{transform:rotateY(180deg);}
.tile.flipped .tile-inner.fast{transition-duration:.3s;}
 
.tile-face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
 
/* BACK FACE — decorative Islamic tile pattern */
.tile-back{
  background:linear-gradient(145deg,#1E3A28,#162814);
  border:none;
}
/* SVG star pattern via background-image */
.tile-back::before{
  content:'';position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolygon points='30,4 34,22 50,16 38,28 54,34 36,34 40,52 30,40 20,52 24,34 6,34 22,28 10,16 26,22' fill='none' stroke='%23C89040' stroke-width='1' opacity='0.15'/%3E%3Ccircle cx='30' cy='30' r='4' fill='%23C89040' opacity='0.1'/%3E%3C/svg%3E");
  background-size:60px 60px;
}
.tile-back-icon{
  font-size:22px;position:relative;z-index:1;
  animation:iconFloat var(--df,2.5s) var(--dfl,0s) ease-in-out infinite;
  opacity:.6;
}
@keyframes iconFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-3px) scale(1.08)}}
 
/* FRONT FACE — image portion */
.tile-front{
  transform:rotateY(180deg);
  background-color:#F8F4EE;
  background-image:url('./Baby_Mo_Menyapa.png');
  background-repeat:no-repeat;
  /* background-size and background-position set by JS */
}
/* Shimmer overlay on front */
.tile-front::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 50%);
  pointer-events:none;
}
/* Fresh reveal highlight */
.tile.just-revealed .tile-front::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50%,rgba(255,255,255,.55),transparent 70%);
  animation:revealShine .7s ease forwards;
}
@keyframes revealShine{0%{opacity:1}100%{opacity:0}}
 
/* ── SPARKLE BURST (per tile) ── */
.spark{
  position:fixed;pointer-events:none;z-index:100;
  font-size:var(--sz,16px);
  animation:sparkFly var(--dur,0.8s) ease forwards;
  transform-origin:center;
}
@keyframes sparkFly{
  0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg);}
  100%{opacity:0;transform:translate(var(--tx,20px),var(--ty,-40px)) scale(.2) rotate(var(--tr,180deg));}
}
 
/* ── FLOATING PARTICLES (ambient) ── */
.float-p{
  position:fixed;pointer-events:none;z-index:2;
  animation:pFloat var(--pd,4s) var(--pdl,0s) ease-in-out infinite alternate;
  font-size:var(--ps,14px);opacity:.2;
}
@keyframes pFloat{from{transform:translateY(0) rotate(-5deg)}to{transform:translateY(-18px) rotate(5deg)}}
 
/* ── CELEBRATION OVERLAY ── */
#celebOverlay{
  position:fixed;inset:0;z-index:50;
  pointer-events:none;
  opacity:0;transition:opacity .6s ease;
}
#celebOverlay.show{opacity:1;pointer-events:all;}
.celeb-bg{
  position:absolute;inset:0;
  background:linear-gradient(160deg,rgba(11,28,18,.92),rgba(15,32,22,.95));
  backdrop-filter:blur(2px);
}
 
/* Intro card */
.intro-card{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(160deg,#162014,#1C2A1A);
  border-radius:28px 28px 0 0;
  border-top:2px solid rgba(200,144,64,.3);
  padding:28px 24px 40px;
  transform:translateY(100%);
  transition:transform .6s cubic-bezier(.34,1.56,.64,1);
}
.intro-card.show{transform:translateY(0);}
 
.celeb-title{
  text-align:center;
  font-size:clamp(36px,10vw,54px);font-weight:900;
  color:var(--gold-lt);
  text-shadow:0 0 40px rgba(200,144,64,.6),0 4px 20px rgba(0,0,0,.4);
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0) rotate(-5deg);
  transition:transform .7s cubic-bezier(.34,1.56,.64,1) .2s;
  white-space:nowrap;pointer-events:none;
  z-index:10;line-height:1;
}
#celebOverlay.show .celeb-title{transform:translate(-50%,-50%) scale(1) rotate(0deg);}
 
/* Mo image on intro card */
.mo-reveal-img{
  width:130px;height:130px;
  object-fit:contain;
  display:block;margin:0 auto -8px;
  filter:drop-shadow(0 8px 24px rgba(200,144,64,.4));
  animation:moWave 1s ease-in-out infinite alternate;
}
@keyframes moWave{from{transform:rotate(-4deg) scale(1)}to{transform:rotate(4deg) scale(1.04)}}
 
.speech-bubble{
  background:rgba(255,255,255,.07);
  border:1px solid rgba(200,144,64,.22);
  border-radius:18px;padding:12px 16px;
  text-align:center;margin-bottom:14px;
  position:relative;
}
.speech-bubble::before{
  content:'';position:absolute;top:-9px;left:50%;transform:translateX(-50%);
  width:0;height:0;
  border-left:9px solid transparent;border-right:9px solid transparent;
  border-bottom:9px solid rgba(200,144,64,.22);
}
.bubble-text{font-size:20px;font-weight:900;color:var(--cream);}
.bubble-sub{font-size:13px;color:var(--cream-dim);margin-top:3px;}
 
/* Info pills */
.info-row{
  display:flex;gap:8px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;
}
.info-pill{
  background:rgba(44,90,62,.2);
  border:1px solid rgba(93,170,120,.18);
  border-radius:20px;padding:7px 14px;
  font-size:12px;font-weight:800;color:var(--green-glow);
  display:flex;align-items:center;gap:5px;
}
 
/* Play button */
.play-btn{
  width:100%;padding:17px;
  background:linear-gradient(135deg,var(--green),#3A7050);
  border:none;border-radius:16px;
  font-family:'Nunito',sans-serif;font-size:18px;font-weight:900;
  color:#fff;cursor:pointer;
  box-shadow:0 6px 28px rgba(44,90,62,.55);
  display:flex;align-items:center;justify-content:center;gap:10px;
  text-decoration:none;
  animation:btnPulse 2.5s ease-in-out infinite;
}
@keyframes btnPulse{
  0%,100%{box-shadow:0 6px 28px rgba(44,90,62,.55);}
  50%{box-shadow:0 6px 36px rgba(44,90,62,.8),0 0 0 8px rgba(93,170,120,.1);}
}
.play-btn:active{transform:scale(.97);}
 
/* ── FALLING CONFETTI ── */
.conf{
  position:fixed;pointer-events:none;z-index:60;
  animation:confFall linear forwards;
  font-size:var(--cs,18px);
}
@keyframes confFall{
  0%{transform:translateY(-30px) rotate(0deg);opacity:1;}
  80%{opacity:.9;}
  100%{transform:translateY(110vh) rotate(var(--cr,360deg));opacity:0;}
}
 
/* ── PROGRESS RING (small, top area) ── */
.prog-ring{
  position:relative;width:44px;height:44px;flex-shrink:0;
}
.prog-ring svg{transform:rotate(-90deg);}
.prog-ring-bg{fill:none;stroke:rgba(255,255,255,.08);stroke-width:3;}
.prog-ring-fill{fill:none;stroke:var(--gold);stroke-width:3;stroke-linecap:round;
  stroke-dasharray:113;stroke-dashoffset:113;transition:stroke-dashoffset .5s ease;}
.prog-ring-label{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;color:var(--gold-lt);
}
 
/* ── TOAST ── */
.toast{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:linear-gradient(135deg,var(--green),#3A7050);
  border-radius:18px;padding:12px 22px;
  text-align:center;z-index:200;pointer-events:none;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 6px 28px rgba(0,0,0,.4);
}
.toast.show{transform:translate(-50%,-50%) scale(1);}
.toast-e{font-size:28px;}
.toast-t{font-size:14px;font-weight:900;color:#fff;margin-top:2px;}
 
/* Glow shimmer sweeping across complete puzzle */
@keyframes shimmerSweep{
  0%{background-position:-200% 0}
  100%{background-position:200% 0}
}
</style>
</head>
<body>
 
<!-- Starfield -->
<div id="stars"></div>
 
<!-- Floating ambient particles -->
<div class="float-p" style="left:8%;top:20%;--pd:3.2s;--pdl:.5s;--ps:18px;">🌙</div>
<div class="float-p" style="right:10%;top:15%;--pd:2.8s;--pdl:1s;--ps:14px;">✦</div>
<div class="float-p" style="left:15%;bottom:30%;--pd:3.5s;--pdl:.2s;--ps:16px;">⭐</div>
<div class="float-p" style="right:8%;bottom:35%;--pd:2.6s;--pdl:.8s;--ps:12px;">✨</div>
<div class="float-p" style="left:5%;top:50%;--pd:4s;--pdl:.3s;--ps:10px;">◆</div>
<div class="float-p" style="right:5%;top:55%;--pd:3.8s;--pdl:1.2s;--ps:10px;">◆</div>
 
<!-- Toast -->
<div class="toast" id="toast">
  <div class="toast-e" id="toastE">⭐</div>
  <div class="toast-t" id="toastT">Bagus!</div>
</div>
 
<!-- Main Page -->
<div class="page" id="mainPage">
 
  <!-- Header -->
  <div class="hdr">
    <a href="./index.html" class="hdr-back">← Game Hub</a>
    <!-- Progress ring -->
    <div class="prog-ring">
      <svg width="44" height="44" viewBox="0 0 44 44">
        <circle class="prog-ring-bg" cx="22" cy="22" r="18"/>
        <circle class="prog-ring-fill" id="ringFill" cx="22" cy="22" r="18"/>
      </svg>
      <div class="prog-ring-label" id="ringLabel">0</div>
    </div>
    <!-- Counter -->
    <div class="counter-badge" id="counter">
      <span id="countNum">0</span> / 9 🌟
    </div>
  </div>
 
  <!-- Title -->
  <div class="title-area">
    <div class="mystery-label">Kenalan dulu yuk!</div>
    <div class="main-title" id="mainTitle">Siapa <span>aku</span>? 🌟</div>
    <div class="sub-hint" id="subHint">Ketuk petak untuk membuka rahasia!</div>
  </div>
 
  <!-- Puzzle -->
  <div class="puzzle-wrap">
    <div class="puzzle-glow" id="puzzleGlow"></div>
    <div class="grid" id="grid"></div>
  </div>
 
  <!-- Bottom hint -->
  <div style="text-align:center;padding:0 20px;flex-shrink:0;">
    <div id="bottomHint" style="font-size:12px;color:var(--cream-dim);font-weight:700;min-height:20px;transition:all .4s;">
      👆 Ketuk petak yang belum terbuka
    </div>
  </div>
 
</div>
 
<!-- Celebration overlay -->
<div id="celebOverlay">
  <div class="celeb-bg"></div>
 
  <!-- Big name title (appears first) -->
  <div class="celeb-title" id="celebTitle">Baby Mo! 👋</div>
 
  <!-- Introduction card (slides up from bottom) -->
  <div class="intro-card" id="introCard">
 
    <img src="./Baby_Mo_Menyapa.png" class="mo-reveal-img" alt="Baby Mo" id="moImg" onerror="this.style.fontSize='60px';this.src='';this.outerHTML='<div style=\'font-size:60px;text-align:center;margin-bottom:8px;\'>👋</div>'">
 
    <div class="speech-bubble">
      <div class="bubble-text">Halo! Aku Baby Mo! 👋</div>
      <div class="bubble-sub">Assalamu'alaikum, teman baru!</div>
    </div>
 
    <div class="info-row">
      <div class="info-pill">🌙 Suka Belajar Islam</div>
      <div class="info-pill">🎮 Suka Bermain</div>
      <div class="info-pill">⭐ Selalu Semangat</div>
    </div>
 
    <a href="./index.html" class="play-btn">
      🎮 Yuk Main Bersama Baby Mo!
    </a>
 
  </div>
</div>
 
<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const COLS = 3, ROWS = 3, TOTAL = 9;
const IMG_SRC = './Baby_Mo_Menyapa.png';
 
// Compute puzzle size based on viewport
const vw = Math.min(window.innerWidth, 420);
const PUZZLE_SIZE = Math.min(vw - 32, 340); // leave 16px each side, max 340
const TILE_SIZE = (PUZZLE_SIZE - (COLS - 1) * 4) / COLS; // 4px gaps
 
// Tile back icons — cycling
const BACK_ICONS = ['🌙','⭐','✨','🌿','💚','🌟','✦','🌸','☀️'];
 
// Musical notes — C major scale + two extra
const NOTES = [261, 294, 330, 349, 392, 440, 494, 523, 587];
 
// Celebration phrases at milestones
const HINTS = {
  3: '🌟 Sudah 3! Terus ya!',
  6: '🔥 Hampir ketemu! 3 lagi!',
  8: '💚 Satu lagi! Ayo!',
};
 
// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let revealed = 0;
let audioCtx = null;
 
// ═══════════════════════════════════════════
// INIT STARFIELD
// ═══════════════════════════════════════════
(function initStars(){
  const bg = document.getElementById('stars');
  const glyphs = ['✦','·','✧','*','◆','★'];
  for(let i = 0; i < 50; i++){
    const s = document.createElement('i');
    s.textContent = glyphs[i % glyphs.length];
    s.style.cssText =
      `left:${Math.random()*98}%;top:${Math.random()*98}%;`+
      `font-size:${4+Math.random()*7}px;`+
      `--d:${2+Math.random()*4}s;--dl:${Math.random()*4}s;`;
    bg.appendChild(s);
  }
})();
 
// ═══════════════════════════════════════════
// BUILD GRID
// ═══════════════════════════════════════════
function buildGrid(){
  const grid = document.getElementById('grid');
  grid.style.width  = PUZZLE_SIZE + 'px';
  grid.style.height = PUZZLE_SIZE + 'px';
 
  // Glow layer
  const glow = document.getElementById('puzzleGlow');
  glow.style.cssText =
    `width:${PUZZLE_SIZE+60}px;height:${PUZZLE_SIZE+60}px;`+
    `background:radial-gradient(ellipse at 50%,rgba(200,144,64,.35),transparent 65%);`+
    `left:50%;top:50%;transform:translate(-50%,-50%);`;
 
  for(let r = 0; r < ROWS; r++){
    for(let c = 0; c < COLS; c++){
      const idx = r * COLS + c;
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.dataset.idx = idx;
      tile.style.width  = TILE_SIZE + 'px';
      tile.style.height = TILE_SIZE + 'px';
 
      const inner = document.createElement('div');
      inner.className = 'tile-inner';
 
      // BACK face
      const back = document.createElement('div');
      back.className = 'tile-face tile-back';
      const icon = document.createElement('div');
      icon.className = 'tile-back-icon';
      icon.textContent = BACK_ICONS[idx];
      icon.style.cssText = `--df:${2+Math.random()}s;--dfl:${Math.random()*.8}s`;
      back.appendChild(icon);
 
      // FRONT face (image portion)
      const front = document.createElement('div');
      front.className = 'tile-face tile-front';
      // Each tile shows a portion of the full image
      // background-size = PUZZLE_SIZE (fit full image into puzzle area)
      // background-position offsets to show just this tile's region
      // Since image is square and puzzle is square, image fills exactly
      const bx = -(c * (TILE_SIZE + 4)); // +4 for gap
      const by = -(r * (TILE_SIZE + 4));
      front.style.backgroundImage  = `url('${IMG_SRC}')`;
      front.style.backgroundSize   = `${PUZZLE_SIZE}px ${PUZZLE_SIZE}px`;
      front.style.backgroundPosition = `${bx}px ${by}px`;
 
      inner.appendChild(back);
      inner.appendChild(front);
      tile.appendChild(inner);
      grid.appendChild(tile);
 
      // Events
      tile.addEventListener('click', () => onTileTap(tile, idx, r, c));
      tile.addEventListener('touchend', e => {
        e.preventDefault();
        onTileTap(tile, idx, r, c);
      }, { passive: false });
    }
  }
}
 
// ═══════════════════════════════════════════
// TAP HANDLER
// ═══════════════════════════════════════════
function onTileTap(tile, idx, r, c){
  if(tile.classList.contains('flipped')) return;
 
  // Flip
  tile.classList.add('flipped', 'just-revealed');
  setTimeout(() => tile.classList.remove('just-revealed'), 900);
  revealed++;
 
  // Sound
  playNote(NOTES[Math.min(idx, NOTES.length - 1)]);
  vib(40);
 
  // Sparkles from tile center
  const rect = tile.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top  + rect.height / 2;
  spawnSparkles(cx, cy, 10);
 
  // Counter update
  updateCounter();
 
  // Hint messages
  if(HINTS[revealed]){
    showBottomHint(HINTS[revealed]);
  }
 
  // Milestones
  if(revealed === 3){
    showToast('🌟', 'Bagus sekali!');
  } else if(revealed === 6){
    showToast('🔥', 'Hampir ketemu!');
    // Pulse the grid
    document.getElementById('grid').style.transform = 'scale(1.02)';
    setTimeout(() => document.getElementById('grid').style.transform = '', 300);
  }
 
  // Complete
  if(revealed === TOTAL){
    setTimeout(() => onComplete(), 700);
  }
}
 
// ═══════════════════════════════════════════
// COUNTER + RING UPDATE
// ═══════════════════════════════════════════
function updateCounter(){
  document.getElementById('countNum').textContent = revealed;
  // Ring circumference = 2π×18 ≈ 113
  const offset = 113 - (revealed / TOTAL) * 113;
  document.getElementById('ringFill').style.strokeDashoffset = offset;
  document.getElementById('ringLabel').textContent = revealed;
  // Bump animation
  const c = document.getElementById('counter');
  c.classList.remove('bump');
  void c.offsetWidth; // reflow
  c.classList.add('bump');
 
  // Color ring gold when complete
  if(revealed === TOTAL){
    document.getElementById('ringFill').style.stroke = '#6DB882';
  }
}
 
// ═══════════════════════════════════════════
// COMPLETION
// ═══════════════════════════════════════════
function onComplete(){
  vib([80,40,120,40,160]);
  // Grid gets gold border
  document.getElementById('grid').classList.add('complete');
  document.getElementById('puzzleGlow').style.opacity = '1';
 
  // Title changes
  document.getElementById('mainTitle').innerHTML = 'Ketemu! <span>Baby Mo!</span> 🎉';
  document.getElementById('subHint').style.opacity = '0';
  showBottomHint('');
 
  // Big confetti shower
  for(let i = 0; i < 60; i++){
    setTimeout(() => dropConfetti(), i * 55);
  }
 
  // Play celebratory fanfare
  playCelebration();
 
  // Show overlay after 900ms
  setTimeout(() => {
    const ov = document.getElementById('celebOverlay');
    ov.classList.add('show');
    // Slide in intro card 400ms later
    setTimeout(() => {
      document.getElementById('introCard').classList.add('show');
    }, 500);
  }, 900);
}
 
// ═══════════════════════════════════════════
// SPARKLES
// ═══════════════════════════════════════════
const SPARK_GLYPHS = ['✨','⭐','🌟','✦','💛','💚','🌙','◆','★','•'];
function spawnSparkles(cx, cy, count){
  for(let i = 0; i < count; i++){
    setTimeout(() => {
      const s = document.createElement('div');
      s.className = 'spark';
      const angle = (Math.random() * 360) * Math.PI / 180;
      const dist  = 30 + Math.random() * 60;
      const tx    = Math.cos(angle) * dist;
      const ty    = Math.sin(angle) * dist - 20;
      const sz    = 10 + Math.random() * 16;
      const dur   = 0.5 + Math.random() * 0.5;
      const rot   = (-180 + Math.random() * 360);
      s.textContent = SPARK_GLYPHS[Math.floor(Math.random() * SPARK_GLYPHS.length)];
      s.style.cssText =
        `left:${cx}px;top:${cy}px;`+
        `--sz:${sz}px;--tx:${tx}px;--ty:${ty}px;`+
        `--tr:${rot}deg;--dur:${dur}s;`;
      document.body.appendChild(s);
      setTimeout(() => s.remove(), dur * 1000 + 100);
    }, i * 35);
  }
}
 
// ═══════════════════════════════════════════
// CONFETTI
// ═══════════════════════════════════════════
const CONF_GLYPHS = ['⭐','🌟','✨','💚','🌙','✦','🎉','🌸','💛','🤩'];
function dropConfetti(){
  const c = document.createElement('div');
  c.className = 'conf';
  const dur = 2 + Math.random() * 2.5;
  const rot = 180 + Math.floor(Math.random() * 540);
  c.textContent = CONF_GLYPHS[Math.floor(Math.random() * CONF_GLYPHS.length)];
  c.style.cssText =
    `left:${Math.random() * 100}vw;top:-30px;`+
    `--cs:${12+Math.random()*14}px;--cr:${rot}deg;`+
    `animation-duration:${dur}s;animation-delay:${Math.random()*0.5}s;`;
  document.body.appendChild(c);
  setTimeout(() => c.remove(), (dur + 0.5) * 1000);
}
 
// ═══════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════
function getCtx(){
  if(!audioCtx){
    try{ audioCtx = new(window.AudioContext || window.webkitAudioContext)(); }
    catch(e){}
  }
  return audioCtx;
}
function playNote(freq){
  const ctx = getCtx(); if(!ctx) return;
  try{
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    const f = ctx.createBiquadFilter();
    f.type = 'lowpass'; f.frequency.value = 1200;
    o.type = 'sine'; o.frequency.value = freq;
    o.connect(f); f.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0, ctx.currentTime);
    g.gain.linearRampToValueAtTime(0.28, ctx.currentTime + 0.04);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);
    o.start(ctx.currentTime);
    o.stop(ctx.currentTime + 0.45);
  }catch(e){}
}
function playCelebration(){
  const ctx = getCtx(); if(!ctx) return;
  const chord = [261,330,392,523]; // C major chord
  chord.forEach((f, i) => {
    setTimeout(() => playNote(f), i * 60);
  });
  setTimeout(() => {
    [523,659,784,1046].forEach((f,i) => setTimeout(() => playNote(f), i*110));
  }, 400);
}
 
// ═══════════════════════════════════════════
// VIBRATION
// ═══════════════════════════════════════════
function vib(p){
  try{ navigator.vibrate && navigator.vibrate(p||40); }catch(e){}
}
 
// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
let toastTimer;
function showToast(e, t){
  clearTimeout(toastTimer);
  document.getElementById('toastE').textContent = e;
  document.getElementById('toastT').textContent = t;
  const el = document.getElementById('toast');
  el.classList.add('show');
  toastTimer = setTimeout(() => el.classList.remove('show'), 1500);
}
 
// ═══════════════════════════════════════════
// BOTTOM HINT
// ═══════════════════════════════════════════
let hintTimer;
function showBottomHint(msg){
  clearTimeout(hintTimer);
  const el = document.getElementById('bottomHint');
  el.style.opacity = '0';
  el.style.transform = 'translateY(6px)';
  setTimeout(() => {
    el.textContent = msg;
    el.style.opacity = '1';
    el.style.transform = 'translateY(0)';
    el.style.transition = 'all .4s cubic-bezier(.34,1.56,.64,1)';
  }, 200);
  if(msg){
    hintTimer = setTimeout(() => {
      el.style.opacity = '0';
    }, 2500);
  }
}
 
// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
buildGrid();
// Subtle ambient sparkle every few seconds
setInterval(() => {
  if(revealed < TOTAL){
    const x = 50 + Math.random() * (window.innerWidth - 100);
    const y = 80 + Math.random() * (window.innerHeight * 0.6);
    spawnSparkles(x, y, 2);
  }
}, 2200);
</script>
