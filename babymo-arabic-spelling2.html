<!DOCTYPE html>
<html lang="id" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#03100c" />
<meta name="description" content="Kata Islam — BabyMo Arabic Spelling Game for Kids" />
<title>🔤 Kata Islam · BabyMo</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg-deepest: #03100c;
    --bg-deep:    #061a14;
    --bg-mid:     #0a2820;
    --emerald:      #10b981;
    --emerald-soft: #34d399;
    --emerald-deep: #065f46;
    --gold:      #fbbf24;
    --gold-soft: #fcd34d;
    --gold-deep: #d97706;
    --ivory:      #fffbeb;
    --text:       #f0fdf4;
    --text-soft:  rgba(240,253,244,0.62);
    --text-faint: rgba(240,253,244,0.36);

    --rose:       rgba(244,114,182,1);
    --moonlight:  rgba(251,191,36,1);
    --leaf:       rgba(132,204,22,1);

    --r-card: 28px;
    --r-pill: 999px;
    --f-arabic:  'Amiri', 'Scheherazade New', serif;
    --f-display: 'Fraunces', 'Plus Jakarta Sans', serif;
    --f-body:    'Plus Jakarta Sans', system-ui, sans-serif;
  }

  * {
    box-sizing: border-box; margin: 0; padding: 0;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }

  html, body {
    background: var(--bg-deepest);
    color: var(--text);
    font-family: var(--f-body);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body {
    background:
      radial-gradient(ellipse 70% 50% at 50% -5%,  rgba(16,185,129,0.10), transparent 60%),
      radial-gradient(ellipse 90% 60% at 50% 110%, rgba(6,95,70,0.12),    transparent 70%),
      radial-gradient(circle at 85% 18%, rgba(251,191,36,0.05), transparent 40%),
      linear-gradient(180deg, #061a14 0%, #03100c 70%, #020a07 100%);
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 17% 24%, rgba(255,255,255,0.35), transparent 60%),
      radial-gradient(1px 1px at 62% 71%, rgba(251,191,36,0.22),  transparent 60%),
      radial-gradient(1px 1px at 81% 18%, rgba(255,255,255,0.30), transparent 60%),
      radial-gradient(1px 1px at 33% 82%, rgba(16,185,129,0.28),  transparent 60%),
      radial-gradient(1px 1px at 91% 58%, rgba(255,255,255,0.20), transparent 60%),
      radial-gradient(1px 1px at 48% 41%, rgba(251,191,36,0.18),  transparent 60%);
    background-size: 240px 240px;
    pointer-events: none;
    z-index: 0;
    animation: twinkle 9s ease-in-out infinite;
  }
  body::after {
    content: '';
    position: fixed;
    top: -40px; right: -60px;
    width: 240px; height: 240px;
    background: radial-gradient(circle at 30% 50%, rgba(251,191,36,0.10), transparent 55%);
    pointer-events: none;
    z-index: 0;
    filter: blur(8px);
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.55; }
    50%      { opacity: 1; }
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 440px;
    margin: 0 auto;
    padding: 14px 18px 160px;
    min-height: 100vh;
  }

  .view { display: none; }
  .view.active { display: block; animation: viewIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes viewIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: none; }
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 2px 4px;
    margin-bottom: 8px;
  }
  .btn-soft {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(16,185,129,0.07);
    border: 1px solid rgba(16,185,129,0.20);
    color: var(--text-soft);
    font-family: var(--f-body);
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.02em;
    padding: 9px 16px;
    border-radius: var(--r-pill);
    text-decoration: none;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    cursor: pointer;
    transition: transform .2s ease, background .25s ease, color .25s ease;
  }
  .btn-soft:active {
    transform: scale(0.95);
    background: rgba(16,185,129,0.14);
    color: var(--text);
  }
  .brand {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.14em;
    font-weight: 600;
    text-transform: uppercase;
  }
  .brand img {
    width: 26px; height: 26px;
    border-radius: 50%;
    filter: drop-shadow(0 0 8px rgba(16,185,129,0.45));
  }

  /* ===== MENU ===== */
  .hero { text-align: center; padding: 14px 0 8px; position: relative; }
  .mascot {
    width: 124px; height: 124px;
    margin: 0 auto 18px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 50% 45%, rgba(16,185,129,0.35), transparent 65%),
      radial-gradient(circle at 50% 50%, rgba(251,191,36,0.08), transparent 70%);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    animation: breathe 4.5s ease-in-out infinite;
  }
  .mascot::after {
    content: '';
    position: absolute; inset: -10px;
    border-radius: 50%;
    border: 1px solid rgba(251,191,36,0.18);
    animation: haloPulse 4.5s ease-in-out infinite;
  }
  .mascot img {
    width: 108px; height: 108px;
    border-radius: 50%;
    object-fit: cover;
    filter: drop-shadow(0 6px 22px rgba(16,185,129,0.45));
    position: relative;
    z-index: 1;
  }
  @keyframes breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
  @keyframes haloPulse { 0%,100%{transform:scale(1);opacity:0.45} 50%{transform:scale(1.08);opacity:0.75} }

  .hero h1 {
    font-family: var(--f-display);
    font-weight: 600;
    font-size: 34px;
    line-height: 1.1;
    letter-spacing: -0.015em;
    color: var(--ivory);
    text-shadow: 0 0 30px rgba(251,191,36,0.22), 0 2px 12px rgba(0,0,0,0.4);
  }
  .hero h1 .sparkle {
    display: inline-block; margin-left: 4px;
    animation: sparkleSpin 3s ease-in-out infinite;
    filter: drop-shadow(0 0 14px rgba(251,191,36,0.7));
  }
  @keyframes sparkleSpin {
    0%,100%{transform:rotate(0deg) scale(1)}
    50%{transform:rotate(18deg) scale(1.18)}
  }

  .section-preview {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .preview-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(16,185,129,0.07);
    border: 1px solid rgba(16,185,129,0.18);
    border-radius: var(--r-pill);
    padding: 6px 12px;
    font-size: 11px;
    color: var(--text-soft);
    font-weight: 600;
    letter-spacing: 0.04em;
    backdrop-filter: blur(8px);
  }
  .preview-chip span:first-child { font-size: 13px; }

  .section {
    margin-top: 32px;
    position: relative;
  }
  .section + .section { margin-top: 28px; }

  .section-header {
    display: flex; align-items: center; gap: 12px;
    padding: 4px 4px 16px;
  }
  .section-emoji {
    font-size: 26px; line-height: 1;
  }
  .section-title {
    font-family: var(--f-display);
    font-weight: 600;
    font-size: 18px;
    color: var(--text);
    letter-spacing: 0.02em;
  }
  .section-count {
    font-size: 10px;
    color: var(--text-faint);
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .section-line {
    flex: 1; height: 1px;
    background: linear-gradient(90deg, rgba(16,185,129,0.30) 0%, transparent 100%);
  }

  .section[data-section="family"] .section-emoji {
    filter: drop-shadow(0 0 14px rgba(244,114,182,0.55));
  }
  .section[data-section="islam"] .section-emoji {
    filter: drop-shadow(0 0 14px rgba(251,191,36,0.55));
  }
  .section[data-section="nature"] .section-emoji {
    filter: drop-shadow(0 0 14px rgba(132,204,22,0.55));
  }
  .section[data-section="family"] .section-line {
    background: linear-gradient(90deg, rgba(244,114,182,0.30) 0%, transparent 100%);
  }
  .section[data-section="nature"] .section-line {
    background: linear-gradient(90deg, rgba(132,204,22,0.30) 0%, transparent 100%);
  }

  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .card {
    position: relative;
    background:
      linear-gradient(160deg, rgba(16,185,129,0.10) 0%, rgba(6,95,70,0.04) 60%, rgba(3,16,12,0.10) 100%);
    border: 1px solid rgba(16,185,129,0.20);
    border-radius: var(--r-card);
    padding: 22px 14px 20px;
    text-align: center;
    cursor: pointer;
    overflow: hidden;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset, 0 12px 28px rgba(0,0,0,0.30);
    transition: transform .28s cubic-bezier(0.34,1.56,0.64,1), box-shadow .35s ease, border-color .3s ease;
    opacity: 0;
    transform: translateY(18px) scale(0.96);
    animation: cardIn 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards;
    min-height: 180px;
    font: inherit;
    color: inherit;
  }

  .section[data-section="family"] .card {
    background:
      linear-gradient(160deg, rgba(244,114,182,0.08) 0%, rgba(6,95,70,0.04) 60%, rgba(3,16,12,0.10) 100%);
    border: 1px solid rgba(244,114,182,0.18);
  }
  .section[data-section="family"] .card:active {
    border-color: rgba(244,114,182,0.50);
    box-shadow:
      0 0 0 1px rgba(244,114,182,0.30) inset,
      0 0 40px rgba(244,114,182,0.25),
      0 12px 32px rgba(0,0,0,0.35);
  }

  .section[data-section="nature"] .card {
    background:
      linear-gradient(160deg, rgba(132,204,22,0.10) 0%, rgba(6,95,70,0.04) 60%, rgba(3,16,12,0.10) 100%);
    border: 1px solid rgba(132,204,22,0.18);
  }
  .section[data-section="nature"] .card:active {
    border-color: rgba(132,204,22,0.50);
    box-shadow:
      0 0 0 1px rgba(132,204,22,0.30) inset,
      0 0 40px rgba(132,204,22,0.25),
      0 12px 32px rgba(0,0,0,0.35);
  }

  .card::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 30%, rgba(16,185,129,0.18), transparent 60%);
    opacity: 0;
    transition: opacity .35s ease;
    pointer-events: none;
  }
  .card::after {
    content: '';
    position: absolute; top:0; left:0; right:0;
    height: 50%;
    background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent);
    pointer-events: none;
    border-radius: var(--r-card) var(--r-card) 0 0;
  }
  .card:active {
    transform: scale(0.96);
    border-color: rgba(251,191,36,0.45);
    box-shadow:
      0 0 0 1px rgba(251,191,36,0.30) inset,
      0 0 40px rgba(16,185,129,0.30),
      0 12px 32px rgba(0,0,0,0.35);
  }
  .card:active::before { opacity: 1; }
  @keyframes cardIn { to { opacity: 1; transform: translateY(0) scale(1); } }

  .card-spark {
    position: absolute; top: 12px; right: 14px;
    font-size: 11px; opacity: 0.55;
    animation: sparkRotate 9s linear infinite;
    filter: drop-shadow(0 0 6px rgba(251,191,36,0.45));
  }
  @keyframes sparkRotate { to { transform: rotate(360deg); } }

  .card-emoji {
    font-size: 36px; line-height: 1;
    display: block; margin-bottom: 10px;
    filter: drop-shadow(0 6px 14px rgba(0,0,0,0.45));
    animation: floatGentle 5s ease-in-out infinite;
  }
  .card:nth-child(2n) .card-emoji { animation-delay: -2.5s; }
  @keyframes floatGentle { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

  .card-arabic {
    font-family: var(--f-arabic);
    font-weight: 700;
    font-size: 52px;
    line-height: 1.05;
    color: var(--ivory);
    margin: 6px 0 12px;
    direction: rtl;
    text-shadow:
      0 0 24px rgba(251,191,36,0.32),
      0 0 14px rgba(16,185,129,0.35),
      0 2px 8px rgba(0,0,0,0.40);
    letter-spacing: 0.01em;
  }
  .card-latin {
    font-family: var(--f-display);
    font-weight: 600;
    font-size: 15px;
    color: var(--gold-soft);
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }
  .card-meaning {
    font-family: var(--f-body);
    font-weight: 500;
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.06em;
    text-transform: lowercase;
  }

  /* ----- PINNED CTA (menu only — toggled via JS) ----- */
  .cta-wrap {
    position: fixed;
    bottom: 14px;
    left: 18px;
    right: 18px;
    max-width: 404px;
    margin: 0 auto;
    z-index: 50;
    text-align: center;
    opacity: 0;
    transform: translateY(14px);
    animation: ctaWrapIn 0.8s cubic-bezier(0.34,1.56,0.64,1) forwards;
    animation-delay: 1.0s;
  }
  @keyframes ctaWrapIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .cta-backdrop {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 130px;
    background: linear-gradient(to top,
      var(--bg-deepest) 0%,
      rgba(3,16,12,0.85) 40%,
      transparent 100%);
    z-index: 49;
    pointer-events: none;
  }

  .cta {
    display: block; width: 100%;
    padding: 18px 22px;
    background:
      radial-gradient(circle at 30% 0%, rgba(251,191,36,0.30), transparent 50%),
      linear-gradient(135deg, #10b981 0%, #059669 55%, #047857 100%);
    border: none;
    border-radius: 22px;
    font-family: var(--f-display);
    font-weight: 600;
    font-size: 17px;
    color: #fffbeb;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    text-shadow: 0 1px 8px rgba(0,0,0,0.30);
    box-shadow:
      0 0 0 1px rgba(251,191,36,0.35) inset,
      0 1px 0 rgba(255,255,255,0.12) inset,
      0 10px 26px rgba(16,185,129,0.38),
      0 0 44px rgba(16,185,129,0.26);
    transition: transform .2s ease;
    animation: ctaGlow 3.8s ease-in-out infinite;
  }
  @keyframes ctaGlow {
    0%,100% {
      box-shadow:
        0 0 0 1px rgba(251,191,36,0.35) inset,
        0 1px 0 rgba(255,255,255,0.12) inset,
        0 10px 26px rgba(16,185,129,0.38),
        0 0 44px rgba(16,185,129,0.26);
    }
    50% {
      box-shadow:
        0 0 0 1px rgba(251,191,36,0.55) inset,
        0 1px 0 rgba(255,255,255,0.18) inset,
        0 12px 32px rgba(16,185,129,0.55),
        0 0 64px rgba(16,185,129,0.42);
    }
  }
  .cta::before {
    content: '';
    position: absolute;
    top: 0; left: -120%;
    width: 70%; height: 100%;
    background: linear-gradient(100deg, transparent 30%, rgba(255,255,255,0.22) 50%, transparent 70%);
    animation: ctaShine 5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes ctaShine { 0%,100%{left:-120%} 50%{left:120%} }
  .cta:active { transform: scale(0.97); }
  .cta .emoji-left  { margin-right: 8px; filter: drop-shadow(0 0 6px rgba(251,191,36,0.7)); }
  .cta .emoji-right { margin-left: 8px;  filter: drop-shadow(0 0 6px rgba(251,191,36,0.7)); }

  .cta-hint {
    margin-top: 8px;
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.10em;
    font-weight: 600;
    text-transform: uppercase;
  }

  /* ===== GAME ===== */
  .game-progress {
    font-size: 12px;
    color: var(--text-soft);
    font-weight: 600;
    letter-spacing: 0.08em;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .game-progress .sec-icon {
    font-size: 14px;
    filter: drop-shadow(0 0 8px rgba(251,191,36,0.4));
  }

  .word-card {
    text-align: center;
    padding: 22px 18px 24px;
    background:
      linear-gradient(160deg, rgba(16,185,129,0.10) 0%, rgba(6,95,70,0.04) 60%, rgba(3,16,12,0.10) 100%);
    border: 1px solid rgba(16,185,129,0.20);
    border-radius: 28px;
    margin: 18px 0 30px;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(12px);
    box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset, 0 12px 28px rgba(0,0,0,0.30);
  }
  .word-card::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 50%;
    background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent);
    pointer-events: none;
    border-radius: 28px 28px 0 0;
  }
  .word-emoji {
    font-size: 56px; line-height: 1;
    margin-bottom: 8px;
    filter: drop-shadow(0 6px 18px rgba(0,0,0,0.45));
    animation: floatGentle 5s ease-in-out infinite;
  }
  .word-latin {
    font-family: var(--f-display);
    font-weight: 600;
    font-size: 20px;
    color: var(--gold-soft);
    letter-spacing: 0.04em;
    margin-bottom: 2px;
  }
  .word-meaning {
    font-size: 12px;
    color: var(--text-faint);
    letter-spacing: 0.10em;
    text-transform: lowercase;
  }
  .word-ghost {
    font-family: var(--f-arabic);
    font-weight: 700;
    font-size: 44px;
    line-height: 1;
    color: rgba(255,255,255,0.12);
    direction: rtl;
    margin-top: 16px;
    letter-spacing: 0.02em;
    transition: color .4s ease, text-shadow .4s ease;
  }
  .word-card.speaking-word .word-ghost {
    color: rgba(252,211,77,0.85);
    text-shadow: 0 0 24px rgba(251,191,36,0.55);
  }

  .slots {
    display: flex;
    flex-direction: row-reverse;
    justify-content: center;
    gap: 10px;
    margin-bottom: 34px;
    padding: 0 4px;
    flex-wrap: wrap;
  }
  .slot {
    width: 62px; height: 78px;
    border-radius: 20px;
    background: rgba(16,185,129,0.05);
    border: 2px dashed rgba(16,185,129,0.30);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    transition: all .3s cubic-bezier(0.34,1.56,0.64,1);
    flex-shrink: 0;
  }
  .slot-ghost {
    font-family: var(--f-arabic);
    font-weight: 700;
    font-size: 36px;
    color: rgba(255,255,255,0.10);
    line-height: 1;
    direction: rtl;
  }
  .slot.filled {
    background: linear-gradient(160deg, rgba(16,185,129,0.30), rgba(6,95,70,0.15));
    border: 2px solid rgba(251,191,36,0.55);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.10) inset,
      0 0 30px rgba(16,185,129,0.40),
      0 0 18px rgba(251,191,36,0.30);
    animation: slotPop 0.55s cubic-bezier(0.34,1.56,0.64,1);
  }
  .slot.speaking {
    animation: slotSpeak 0.6s ease;
  }
  @keyframes slotPop {
    0%   { transform: scale(0.7); }
    60%  { transform: scale(1.18); }
    100% { transform: scale(1); }
  }
  @keyframes slotSpeak {
    0%, 100% { box-shadow:
      0 0 0 1px rgba(255,255,255,0.10) inset,
      0 0 30px rgba(16,185,129,0.40),
      0 0 18px rgba(251,191,36,0.30); }
    50% { box-shadow:
      0 0 0 2px rgba(251,191,36,0.7) inset,
      0 0 50px rgba(251,191,36,0.65),
      0 0 30px rgba(251,191,36,0.50);
      transform: scale(1.06); }
  }
  .slot-letter {
    font-family: var(--f-arabic);
    font-weight: 700;
    font-size: 40px;
    color: var(--ivory);
    line-height: 1;
    direction: rtl;
    text-shadow: 0 0 18px rgba(251,191,36,0.55), 0 0 10px rgba(16,185,129,0.50);
  }

  .pool-label {
    text-align: center;
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 14px;
  }

  .pool {
    display: flex;
    flex-direction: row-reverse;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-bottom: 24px;
  }
  .tile {
    width: 66px; height: 80px;
    border-radius: 22px;
    background: linear-gradient(160deg, rgba(16,185,129,0.20), rgba(6,95,70,0.10));

<script>
const SECTIONS = [
  { id: 'family', emoji: '❤️', name: 'Keluarga' },
  { id: 'islam',  emoji: '🌙', name: 'Islam' },
  { id: 'nature', emoji: '🌿', name: 'Alam' }
];

const WORDS = [
  { section: 'family', emoji: '❤️', arabic: 'أُمِّي',  latin: 'Ummi',    meaning: 'ibu',
    letters: ['أ','م','ي'] },
  { section: 'family', emoji: '💪', arabic: 'أَبِي',   latin: 'Abbi',    meaning: 'ayah',
    letters: ['أ','ب','ي'] },
  { section: 'family', emoji: '👦', arabic: 'أَخِي',   latin: 'Akhi',    meaning: 'kakak laki-laki',
    letters: ['أ','خ','ي'] },
  { section: 'family', emoji: '👧', arabic: 'أُخْتِي', latin: 'Ukhti',   meaning: 'kakak perempuan',
    letters: ['أ','خ','ت','ي'] },
  { section: 'family', emoji: '🏠', arabic: 'بَيْت',   latin: 'Bayt',    meaning: 'rumah',
    letters: ['ب','ي','ت'] },
  { section: 'family', emoji: '🍚', arabic: 'طَعَام',  latin: "Tha'am",  meaning: 'makanan',
    letters: ['ط','ع','ا','م'] },
  { section: 'family', emoji: '💧', arabic: 'مَاء',    latin: "Maa'",    meaning: 'air',
    letters: ['م','ا','ء'] },
  { section: 'family', emoji: '😴', arabic: 'نَوْم',   latin: 'Nawm',    meaning: 'tidur',
    letters: ['ن','و','م'] },

  { section: 'islam',  emoji: '🌙', arabic: 'بِسْمِ',  latin: 'Bism',    meaning: 'dengan nama',
    letters: ['ب','س','م'] },
  { section: 'islam',  emoji: '✨', arabic: 'اللّٰه',  latin: 'Allah',   meaning: 'allah',
    letters: ['ا','ل','ل','ه'] },
  { section: 'islam',  emoji: '🤲', arabic: 'دُعَاء',  latin: "Du'a",    meaning: 'doa',
    letters: ['د','ع','ا','ء'] },
  { section: 'islam',  emoji: '🕌', arabic: 'مَسْجِد', latin: 'Masjid',  meaning: 'masjid',
    letters: ['م','س','ج','د'] },
  { section: 'islam',  emoji: '📖', arabic: 'كِتَاب',  latin: 'Kitab',   meaning: 'buku',
    letters: ['ك','ت','ا','ب'] },
  { section: 'islam',  emoji: '👋', arabic: 'سَلَام',  latin: 'Salam',   meaning: 'salam',
    letters: ['س','ل','ا','م'] },
  { section: 'islam',  emoji: '😊', arabic: 'شُكْرًا', latin: 'Syukran', meaning: 'terima kasih',
    letters: ['ش','ك','ر','ا'] },

  { section: 'nature', emoji: '☀️', arabic: 'شَمْس',   latin: 'Syams',   meaning: 'matahari',
    letters: ['ش','م','س'] },
  { section: 'nature', emoji: '🌙', arabic: 'قَمَر',   latin: 'Qamar',   meaning: 'bulan',
    letters: ['ق','م','ر'] },
  { section: 'nature', emoji: '⭐', arabic: 'نَجْم',   latin: 'Najm',    meaning: 'bintang',
    letters: ['ن','ج','م'] },
  { section: 'nature', emoji: '🌸', arabic: 'زَهْرَة', latin: 'Zahrah',  meaning: 'bunga',
    letters: ['ز','ه','ر','ة'] },
  { section: 'nature', emoji: '🐟', arabic: 'سَمَك',   latin: 'Samak',   meaning: 'ikan',
    letters: ['س','م','ك'] },
  { section: 'nature', emoji: '🐦', arabic: 'طَيْر',   latin: 'Thayr',   meaning: 'burung',
    letters: ['ط','ي','ر'] }
];

const LETTER_NAMES = {
  'ا': 'أَلِف', 'أ': 'أَلِف', 'إ': 'أَلِف', 'آ': 'أَلِف',
  'ب': 'بَاء', 'ت': 'تَاء', 'ث': 'ثَاء',
  'ج': 'جِيم', 'ح': 'حَاء', 'خ': 'خَاء',
  'د': 'دَال', 'ذ': 'ذَال',
  'ر': 'رَاء', 'ز': 'زَاي',
  'س': 'سِين', 'ش': 'شِين',
  'ص': 'صَاد', 'ض': 'ضَاد',
  'ط': 'طَاء', 'ظ': 'ظَاء',
  'ع': 'عَيْن', 'غ': 'غَيْن',
  'ف': 'فَاء', 'ق': 'قَاف',
  'ك': 'كَاف', 'ل': 'لَام', 'م': 'مِيم', 'ن': 'نُون',
  'ه': 'هَاء', 'و': 'وَاو', 'ي': 'يَاء',
  'ء': 'هَمْزَة', 'ة': 'تَاء مَرْبُوطَة'
};

/* ----- Speech ----- */
if ('speechSynthesis' in window) {
  try { window.speechSynthesis.getVoices(); } catch (e) {}
  if ('onvoiceschanged' in window.speechSynthesis) {
    window.speechSynthesis.onvoiceschanged = function () {
      try { window.speechSynthesis.getVoices(); } catch (e) {}
    };
  }
}

function getArabicVoice() {
  if (!('speechSynthesis' in window)) return null;
  try {
    const voices = window.speechSynthesis.getVoices();
    return voices.find(function (v) {
      return v.lang && v.lang.toLowerCase().indexOf('ar') === 0;
    }) || null;
  } catch (e) { return null; }
}

function cancelSpeech() {
  if ('speechSynthesis' in window) {
    try { window.speechSynthesis.cancel(); } catch (e) {}
  }
}

function speakArabic(text, opts, onEnd) {
  opts = opts || {};
  if (!('speechSynthesis' in window)) {
    if (onEnd) setTimeout(onEnd, 80); return;
  }
  const voice = getArabicVoice();
  if (!voice) { if (onEnd) setTimeout(onEnd, 80); return; }
  try {
    const u = new SpeechSynthesisUtterance(text);
    u.voice = voice;
    u.lang  = voice.lang;
    u.rate  = opts.rate  || 0.85;
    u.pitch = opts.pitch || 1.0;
    u.volume = 1.0;
    let ended = false;
    const done = function () { if (ended) return; ended = true; if (onEnd) onEnd(); };
    u.onend = done; u.onerror = done;
    window.speechSynthesis.speak(u);
    setTimeout(done, Math.max(text.length * 220, 2500));
  } catch (e) { if (onEnd) setTimeout(onEnd, 80); }
}

function speakLetterQuick(letter) {
  const name = LETTER_NAMES[letter];
  if (!name) return;
  cancelSpeech();
  speakArabic(name, { rate: 0.95, pitch: 1.1 });
}

function speakWordSequence(word, onComplete, onLetter, onWord) {
  cancelSpeech();
  const names = word.letters.map(function (l) { return LETTER_NAMES[l] || l; });
  let i = 0;
  function next() {
    if (i >= names.length) {
      if (onWord) onWord();
      speakArabic(word.arabic, { rate: 0.78, pitch: 1.0 }, function () {
        if (onComplete) setTimeout(onComplete, 250);
      });
      return;
    }
    if (onLetter) onLetter(i);
    speakArabic(names[i], { rate: 0.85, pitch: 1.05 }, function () {
      i++; setTimeout(next, 120);
    });
  }
  next();
}

/* ----- State / routing ----- */
const state = {
  currentIdx: 0,
  filled: [],
  wrongCount: 0,
  completedWords: [],
  sessionStartIdx: 0
};

function showView(name) {
  document.querySelectorAll('.view').forEach(function (v) { v.classList.remove('active'); });
  document.getElementById('view' + name).classList.add('active');

  // Pinned CTA only visible on Menu view
  const isMenu = (name === 'Menu');
  const ctaWrap = document.getElementById('ctaWrap');
  const ctaBackdrop = document.getElementById('ctaBackdrop');
  if (ctaWrap)     ctaWrap.style.display     = isMenu ? '' : 'none';
  if (ctaBackdrop) ctaBackdrop.style.display = isMenu ? '' : 'none';

  window.scrollTo({ top: 0 });
}

function getSection(id) { return SECTIONS.find(function (s) { return s.id === id; }); }
function getSectionWords(id) { return WORDS.filter(function (w) { return w.section === id; }); }
function getFirstIdxOfSection(id) { return WORDS.findIndex(function (w) { return w.section === id; }); }
function getNextSection(currentId) {
  const idx = SECTIONS.findIndex(function (s) { return s.id === currentId; });
  return (idx >= 0 && idx < SECTIONS.length - 1) ? SECTIONS[idx + 1] : null;
}
function getSectionPosition(wordIdx) {
  const w = WORDS[wordIdx];
  const sectionWords = getSectionWords(w.section);
  const pos = sectionWords.findIndex(function (x) { return x === w; });
  return { position: pos, total: sectionWords.length };
}

/* ----- Toast / sparkles ----- */
const toastEl = document.getElementById('toast');
let toastTimer = null;
function showToast(text, emoji) {
  if (typeof emoji === 'undefined') emoji = '✨';
  toastEl.innerHTML = '<span class="toast-emoji">' + emoji + '</span>' + text;
  toastEl.classList.remove('show');
  void toastEl.offsetWidth;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function () { toastEl.classList.remove('show'); }, 1600);
}

function spawnSparkles(originEl, count) {
  if (typeof count === 'undefined') count = 5;
  const rect = originEl.getBoundingClientRect();
  const glyphs = ['✨','⭐','✦','🌟'];
  for (let i = 0; i < count; i++) {
    setTimeout(function () {
      const s = document.createElement('span');
      s.className = 'spark-particle';
      s.textContent = glyphs[Math.floor(Math.random() * glyphs.length)];
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = (Math.random() - 0.5) * 90;
      s.style.left = (cx - 7) + 'px';
      s.style.top  = (cy - 10) + 'px';
      s.style.setProperty('--dx', dx + 'px');
      document.body.appendChild(s);
      setTimeout(function () { s.remove(); }, 1200);
    }, i * 55);
  }
}

/* ----- Menu render ----- */
function renderMenu() {
  const container = document.getElementById('menuSections');
  container.innerHTML = '';
  let globalCardIdx = 0;
  SECTIONS.forEach(function (sec) {
    const words = getSectionWords(sec.id);
    const sectionEl = document.createElement('section');
    sectionEl.className = 'section';
    sectionEl.dataset.section = sec.id;
    sectionEl.setAttribute('aria-labelledby', 'sec-' + sec.id);
    sectionEl.innerHTML =
      '<div class="section-header">' +
        '<span class="section-emoji" aria-hidden="true">' + sec.emoji + '</span>' +
        '<h2 class="section-title" id="sec-' + sec.id + '">' + sec.name + '</h2>' +
        '<span class="section-count">' + words.length + ' Kata</span>' +
        '<div class="section-line" aria-hidden="true"></div>' +
      '</div>' +
      '<div class="cards" id="cards-' + sec.id + '"></div>';
    container.appendChild(sectionEl);

    const cardsEl = sectionEl.querySelector('.cards');
    words.forEach(function (w) {
      const globalIdx = WORDS.indexOf(w);
      const btn = document.createElement('button');
      btn.className = 'card';
      btn.type = 'button';
      btn.dataset.wordIndex = String(globalIdx);
      btn.setAttribute('aria-label', w.latin + ' — ' + w.meaning);
      const delay = Math.min(0.12 + globalCardIdx * 0.04, 0.85);
      btn.style.animationDelay = delay + 's';
      btn.innerHTML =
        '<span class="card-spark" aria-hidden="true">✦</span>' +
        '<span class="card-emoji" aria-hidden="true">' + w.emoji + '</span>' +
        '<div class="card-arabic" lang="ar">' + w.arabic + '</div>' +
        '<div class="card-latin">' + w.latin + '</div>' +
        '<div class="card-meaning">' + w.meaning + '</div>';
      btn.addEventListener('click', function () {
        spawnSparkles(btn, 3);
        setTimeout(function () { startGame(globalIdx); }, 180);
      });
      cardsEl.appendChild(btn);
      globalCardIdx++;
    });
  });
}

/* ----- Game ----- */
function startGame(startIdx) {
  if (typeof startIdx !== 'number') startIdx = 0;
  cancelSpeech();
  state.currentIdx = startIdx;
  state.sessionStartIdx = startIdx;
  state.wrongCount = 0;
  state.completedWords = [];
  renderWord();
  showView('Game');
}

function renderWord() {
  const word = WORDS[state.currentIdx];
  const sec = getSection(word.section);
  const pos = getSectionPosition(state.currentIdx);
  state.filled = word.letters.map(function () { return false; });

  document.getElementById('gameSecIcon').textContent = sec.emoji;
  document.getElementById('gameStep').textContent =
    (pos.position + 1) + ' / ' + pos.total;

  const dotsEl = document.getElementById('gameDots');
  let dotsHtml = '';
  for (let i = 0; i < pos.total; i++) {
    let cls = 'dot';
    if (i < pos.position) cls += ' done';
    else if (i === pos.position) cls += ' active';
    dotsHtml += '<span class="' + cls + '"></span>';
  }
  dotsEl.innerHTML = dotsHtml;

  document.getElementById('gameWordCard').classList.remove('speaking-word');
  document.getElementById('gameEmoji').textContent = word.emoji;
  document.getElementById('gameLatin').textContent = word.latin;
  document.getElementById('gameMeaning').textContent = word.meaning;
  document.getElementById('gameGhost').textContent = word.arabic;

  const slotsEl = document.getElementById('gameSlots');
  slotsEl.innerHTML = '';
  word.letters.forEach(function (letter, i) {
    const slot = document.createElement('div');
    slot.className = 'slot';
    slot.dataset.letter = letter;
    slot.dataset.index = String(i);
    slot.innerHTML = '<span class="slot-ghost" lang="ar">' + letter + '</span>';
    slotsEl.appendChild(slot);
  });

  const poolEl = document.getElementById('gamePool');
  poolEl.innerHTML = '';
  const shuffled = word.letters
    .map(function (l, idx) { return { l: l, idx: idx }; })
    .sort(function () { return Math.random() - 0.5; });
  shuffled.forEach(function (entry) {
    const tile = document.createElement('button');
    tile.className = 'tile';
    tile.type = 'button';
    tile.dataset.letter = entry.l;
    tile.lang = 'ar';
    tile.textContent = entry.l;
    tile.addEventListener('click', function () { onTileTap(tile); });
    poolEl.appendChild(tile);
  });
}

function onTileTap(tile) {
  if (tile.classList.contains('used')) return;
  const letter = tile.dataset.letter;
  const slots = document.querySelectorAll('.slot');
  let target = null;
  for (let i = 0; i < slots.length; i++) {
    const s = slots[i];
    const idx = Number(s.dataset.index);
    if (!state.filled[idx] && s.dataset.letter === letter) { target = s; break; }
  }
  if (!target) {
    tile.classList.add('wrong');
    setTimeout(function () { tile.classList.remove('wrong'); }, 450);
    return;
  }
  flyLetterToSlot(tile, target, letter);
}

function flyLetterToSlot(tile, slot, letter) {
  tile.classList.add('used');
  const tileRect = tile.getBoundingClientRect();
  const slotRect = slot.getBoundingClientRect();
  const ghost = document.createElement('div');
  ghost.className = 'flying-letter';
  ghost.textContent = letter;
  ghost.style.left   = tileRect.left + 'px';
  ghost.style.top    = tileRect.top + 'px';
  ghost.style.width  = tileRect.width + 'px';
  ghost.style.height = tileRect.height + 'px';
  document.body.appendChild(ghost);
  requestAnimationFrame(function () {
    const dx = (slotRect.left + slotRect.width / 2) - (tileRect.left + tileRect.width / 2);
    const dy = (slotRect.top  + slotRect.height / 2) - (tileRect.top + tileRect.height / 2);
    ghost.style.transform = 'translate(' + dx + 'px, ' + dy + 'px) scale(0.85)';
  });
  setTimeout(function () {
    ghost.remove();
    const idx = Number(slot.dataset.index);
    slot.classList.add('filled');
    slot.innerHTML = '<span class="slot-letter" lang="ar">' + letter + '</span>';
    state.filled[idx] = true;
    spawnSparkles(slot, 4);
    speakLetterQuick(letter);
    if (state.filled.every(Boolean)) { onWordComplete(); }
  }, 480);
}

function onWordComplete() {
  const word = WORDS[state.currentIdx];
  state.completedWords.push(word);

  const slots = document.querySelectorAll('.slot');
  slots.forEach(function (s, i) {
    setTimeout(function () { spawnSparkles(s, 4); }, i * 80);
  });

  showToast('Masya Allah!', '✨');

  setTimeout(function () {
    speakWordSequence(
      word,
      function () {
        const nextIdx = state.currentIdx + 1;
        const sameSection = nextIdx < WORDS.length &&
                            WORDS[nextIdx].section === word.section;
        if (sameSection) {
          state.currentIdx = nextIdx;
          renderWord();
        } else {
          showCompletion();
        }
      },
      function (letterIndex) {
        const slot = document.querySelector('.slot[data-index="' + letterIndex + '"]');
        if (!slot) return;
        slot.classList.remove('speaking');
        void slot.offsetWidth;
        slot.classList.add('speaking');
        setTimeout(function () { slot.classList.remove('speaking'); }, 600);
      },
      function () {
        const card = document.getElementById('gameWordCard');
        card.classList.add('speaking-word');
        setTimeout(function () { card.classList.remove('speaking-word'); }, 1600);
      }
    );
  }, 700);
}

/* ----- Completion ----- */
function showCompletion() {
  cancelSpeech();
  const completedSectionId = WORDS[state.currentIdx].section;
  const sec = getSection(completedSectionId);
  const next = getNextSection(completedSectionId);

  const tagEl = document.getElementById('completeSectionTag');
  tagEl.firstElementChild.textContent = sec.emoji;
  document.getElementById('completeSectionName').textContent = sec.name;

  const sub = document.getElementById('completeSub');
  if (next) {
    sub.textContent = 'Kamu sudah belajar ' + state.completedWords.length + ' kata ' + sec.name;
  } else {
    sub.textContent = 'Masya Allah! Semua 21 kata selesai ✨';
  }

  document.getElementById('statWords').textContent = state.completedWords.length;
  document.getElementById('statWrong').textContent = state.wrongCount;

  const list = document.getElementById('learnedList');
  list.innerHTML = state.completedWords.map(function (w) {
    return '<div class="learned">' +
      '<span class="learned-emoji" aria-hidden="true">' + w.emoji + '</span>' +
      '<span class="learned-arabic" lang="ar">' + w.arabic + '</span>' +
      '<span class="learned-latin">' + w.latin + '</span>' +
      '</div>';
  }).join('');

  const btnReplay = document.getElementById('btnReplay');
  const btnNext   = document.getElementById('btnNext');
  btnReplay.onclick = function (e) {
    spawnSparkles(e.currentTarget, 3);
    setTimeout(function () { startGame(getFirstIdxOfSection(completedSectionId)); }, 180);
  };
  if (next) {
    btnNext.textContent = next.emoji + ' Lanjut ' + next.name;
    btnNext.onclick = function (e) {
      spawnSparkles(e.currentTarget, 4);
      showToast(next.name + '!', next.emoji);
      setTimeout(function () { startGame(getFirstIdxOfSection(next.id)); }, 700);
    };
  } else {
    btnNext.textContent = '🏠 Hub';
    btnNext.onclick = function () {
      window.location.href = 'https://roisa.github.io/babymo-games/index.html';
    };
  }

  showView('Complete');

  setTimeout(function () {
    const stars = document.getElementById('completeStars');
    spawnSparkles(stars, 8);
  }, 400);
}

/* ----- Wire up ----- */
renderMenu();

document.getElementById('ctaStart').addEventListener('click', function (e) {
  cancelSpeech();
  spawnSparkles(e.currentTarget, 4);
  showToast('Bismillah!', '🌙');
  setTimeout(function () { startGame(0); }, 700);
});

document.getElementById('btnExitGame').addEventListener('click', function () {
  cancelSpeech();
  showView('Menu');
});

document.getElementById('btnExitComplete').addEventListener('click', function () {
  cancelSpeech();
  showView('Menu');
});

window.addEventListener('pagehide', cancelSpeech);
document.addEventListener('visibilitychange', function () {
  if (document.hidden) cancelSpeech();
});
</script>
