<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0B1C12">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Baby Mo 🌙 Waktunya Tidur</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B1C12;--bg2:#0F2016;--bg3:#071008;
  --card:#162014;--card2:#1C2A1A;
  --green:#2C5A3E;--green-lt:#4A8860;--green-glow:#6DB882;
  --gold:#C89040;--gold-lt:#E8B060;
  --cream:#F0E8D8;--cream-dim:#7A8078;
  --teal:#3ECFB8;--purple:#8870C8;
  --border:rgba(93,170,120,.12);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--cream);font-family:'Nunito','Arial Rounded MT Bold',Arial,sans-serif;}

@keyframes tw{0%,100%{opacity:.06;transform:scale(.7)}50%{opacity:.2;transform:scale(1.3)}}
@keyframes fl{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-12px) rotate(2deg)}}
@keyframes pu{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes su{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes pk{0%{transform:scale(0) rotate(-15deg);opacity:0}65%{transform:scale(1.15) rotate(5deg)}100%{transform:scale(1);opacity:1}}
@keyframes wv{0%,100%{transform:scaleY(.2)}50%{transform:scaleY(1)}}
@keyframes zf{0%{opacity:.7;transform:translateY(0)}100%{opacity:0;transform:translateY(-40px)}}
@keyframes bt{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes rp{to{transform:scale(5);opacity:0}}
@keyframes mof{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-12px) rotate(3deg)}}
@keyframes starFade{0%{opacity:.03}50%{opacity:.18}100%{opacity:.03}}
@keyframes glowBtn{0%,100%{box-shadow:0 6px 28px rgba(44,90,62,.5)}50%{box-shadow:0 6px 40px rgba(44,90,62,.8),0 0 0 10px rgba(93,170,120,.08)}}

.screen{position:fixed;inset:0;display:none;flex-direction:column;background:var(--bg);}
.screen.on{display:flex;}

/* Top progress bar */
.topbar{display:flex;align-items:center;gap:12px;padding:16px 20px 4px;flex-shrink:0;position:relative;z-index:2;}
.ptrack{flex:1;height:10px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;}
.pfill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green),var(--green-glow));transition:width .6s;}
.home-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:7px 12px;color:var(--cream-dim);font-size:16px;cursor:pointer;font-family:inherit;transition:.15s;}
.home-btn:active{opacity:.7;}

/* Step heading */
.shead{text-align:center;padding:10px 24px 0;flex-shrink:0;}
.snum{font-size:10px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--cream-dim);margin-bottom:5px;}
.stitle{font-size:26px;font-weight:900;color:var(--cream);line-height:1.2;}
.shint{font-size:14px;color:var(--cream-dim);margin-top:5px;line-height:1.4;}

/* Main CTA button */
.gbtn{
  background:linear-gradient(135deg,var(--green),#3A7050);
  border:none;border-radius:100px;
  padding:18px 52px;
  font-family:inherit;font-size:20px;font-weight:900;
  color:#fff;cursor:pointer;
  display:inline-flex;align-items:center;gap:10px;
  animation:glowBtn 2.5s ease-in-out infinite;
  touch-action:manipulation;
}
.gbtn:active{transform:scale(.97);}

/* Pajama grid */
.pjgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:320px;}
.pjitem{
  background:rgba(255,255,255,.05);
  border:2.5px solid var(--border);
  border-radius:22px;padding:20px 12px;
  text-align:center;cursor:pointer;
  position:relative;overflow:hidden;
  transition:all .4s cubic-bezier(.34,1.56,.64,1);
  touch-action:manipulation;
}
.pjitem:active{transform:scale(.97);}

/* Dua lines */
.dualine{
  background:rgba(255,255,255,.05);
  border:2px solid var(--border);
  border-radius:18px;padding:16px 18px;
  cursor:pointer;position:relative;overflow:hidden;
  transition:all .35s cubic-bezier(.34,1.56,.64,1);
  touch-action:manipulation;margin-bottom:10px;
}
.dualine.locked{opacity:.25;cursor:default;pointer-events:none;}
.dualine.active{border-color:rgba(200,144,64,.6);background:rgba(200,144,64,.09);}
.dualine.fin{border-color:rgba(109,184,130,.5);background:rgba(93,170,120,.08);}

/* Bed frame */
.bedframe{
  background:#0F2016;border:2px solid #1E3A28;
  border-radius:26px;overflow:hidden;
  width:100%;max-width:290px;height:215px;
  position:relative;flex-shrink:0;
}
.blkout{position:absolute;left:0;right:0;bottom:0;transition:top .3s ease;}
.blkbody{
  position:absolute;inset:0;
  background:linear-gradient(160deg,#1A4A2C,#0F3018 35%,#1E4A2A 65%,#0F3018);
  overflow:hidden;
}
.blkfold{position:absolute;top:0;left:0;right:0;height:18px;background:linear-gradient(135deg,#2A7A48,#1E5A38);border-radius:2px 2px 0 0;}
.blkgrip{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:48px;height:5px;border-radius:99px;background:rgba(109,184,130,.4);}

.donebanner{text-align:center;padding:12px 24px;flex-shrink:0;animation:su .5s ease;}
.ripel{position:absolute;border-radius:50%;pointer-events:none;animation:rp .6s ease forwards;}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
</style>
</head>

<script>
/* ── STARS (gold BabyMo style) ── */
(function(){
  var c=document.getElementById('stars');
  var glyphs=['✦','·','✧','*','◆'];
  for(var i=0;i<50;i++){
    var s=document.createElement('div');
    var z=.5+Math.random()*2.2;
    var g=glyphs[i%glyphs.length];
    s.style.cssText='position:absolute;color:#C89040;font-size:'+z*4+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;opacity:'+(0.03+Math.random()*.12)+';animation:starFade '+(2+Math.random()*4)+'s '+(Math.random()*6)+'s infinite ease-in-out;pointer-events:none;';
    s.textContent=g;
    c.appendChild(s);
  }
})();

/* ── UTILS ── */
function vib(p){try{navigator.vibrate&&navigator.vibrate(p||40);}catch(e){}}

/* ── VOICE SYSTEM — Mom voice ── */
var _vlist=[], _arV=null, _idV=null, _isSpeaking=false;
function _initVoices(){
  if(!window.speechSynthesis)return;
  function load(){
    _vlist=speechSynthesis.getVoices();
    _arV=_vlist.find(function(v){return v.lang==='ar-SA';})||
         _vlist.find(function(v){return v.lang==='ar-EG';})||
         _vlist.find(function(v){return v.lang.startsWith('ar');})||null;
    _idV=_vlist.find(function(v){return v.lang==='id-ID';})||
         _vlist.find(function(v){return v.lang.startsWith('id');})||null;
  }
  load();
  if(speechSynthesis.onvoiceschanged!==undefined) speechSynthesis.onvoiceschanged=load;
}
_initVoices();

/* Indonesian warm "mom" voice */
function speakMom(txt, cb){
  if(!window.speechSynthesis){if(cb)setTimeout(cb,0);return;}
  var u=new SpeechSynthesisUtterance(txt);
  u.lang='id-ID';
  u.rate=0.80;    /* warm, unhurried */
  u.pitch=1.28;   /* higher = softer, maternal */
  u.volume=1.0;
  if(_idV) u.voice=_idV;
  u.onend=u.onerror=function(){if(cb)setTimeout(cb,260);};
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

/* Arabic — slow, clear, reverential */
function speakAr(txt, cb){
  if(!window.speechSynthesis){if(cb)setTimeout(cb,0);return;}
  var u=new SpeechSynthesisUtterance(txt);
  u.lang='ar-SA';
  u.rate=0.40;
  u.pitch=1.05;
  u.volume=1.0;
  if(_arV) u.voice=_arV;
  u.onend=u.onerror=function(){if(cb)setTimeout(cb,0);};
  speechSynthesis.cancel();

/* ── LULLABY ── */
var LUL=(function(){
  var ctx,gain,on=false,tm,ni=0,nt=0;
  var N=[[196,.8],[220,.8],[247,.6],[196,.2],[220,.9],[294,.8],[330,.6],[294,.2],[220,.8],[196,.6],[247,.4],[196,.2],[165,1.4],[0,.5],[196,.7],[220,.7],[247,.5],[294,.7],[330,.9],[294,.6],[247,.6],[220,.6],[196,1.7],[0,.9]];
  function note(f,s,d){
    if(!f||!gain)return;
    var o=ctx.createOscillator(),e=ctx.createGain(),fl=ctx.createBiquadFilter();
    fl.type='lowpass';fl.frequency.value=480;
    o.type='sine';o.frequency.value=f;
    o.connect(fl);fl.connect(e);e.connect(gain);
    e.gain.setValueAtTime(0,s);
    e.gain.linearRampToValueAtTime(.5,s+Math.min(.07,d*.15));
    e.gain.exponentialRampToValueAtTime(.001,s+d-.05);
    o.start(s);o.stop(s+d);
  }
  function tick(){
    while(nt<ctx.currentTime+.7){var n=N[ni%N.length];note(n[0],nt,n[1]);nt+=n[1];ni++;}
    if(on)tm=setTimeout(tick,200);
  }
  return{
    start:function(){
      if(on)return;
      try{
        ctx=new(window.AudioContext||window.webkitAudioContext)();
        gain=ctx.createGain();
        gain.gain.setValueAtTime(0,ctx.currentTime);
        gain.gain.linearRampToValueAtTime(.2,ctx.currentTime+7);
        gain.connect(ctx.destination);
        nt=ctx.currentTime+1.2;ni=0;on=true;tick();
      }catch(e){}
    },
    stop:function(){on=false;clearTimeout(tm);}
  };
})();

/* ── RIPPLE ── */
function addRipple(el,e,color){
  var r=document.createElement('div');r.className='ripel';
  var rect=el.getBoundingClientRect();
  var x=(e.clientX||rect.left+rect.width/2)-rect.left;
  var y=(e.clientY||rect.top+rect.height/2)-rect.top;
  var sz=Math.max(rect.width,rect.height)*2;
  r.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+(x-sz/2)+'px;top:'+(y-sz/2)+'px;background:'+(color||'rgba(255,255,255,.2)')+';';
  el.appendChild(r);setTimeout(function(){r.remove();},700);
}

    for(var k=0;k<3;k++){
      var active=(k===phIdx), done2=(k<phIdx);
      var bg=done2?'var(--green-glow)':active?(phIdx===2?'var(--gold)':'var(--green-glow)'):'rgba(255,255,255,.1)';
      var w=active?'28px':'18px';
      h+='<div style="height:5px;width:'+w+';border-radius:3px;background:'+bg+';transition:all .3s;"></div>';
    }
    return h+'</div>';
  }

  function render(){
    var p=PHASES[phIdx];
    canGo=false;

    wrap.innerHTML=
      /* Step header */
      '<div class="shead"><div class="snum">Langkah 3 dari 4</div>'
      +'<div class="stitle">🤲 Baca Doa</div></div>'

      /* Phase dots */
      +dotBar()

      /* Baby Mo + speech bubble — horizontal row */
      +'<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 20px 4px;flex-shrink:0;">'
      +MO_DUA
      +'<div id="bubble" style="flex:1;background:rgba(44,90,62,.18);border:1px solid rgba(93,170,120,.22);border-radius:0 18px 18px 18px;padding:11px 14px;margin-top:6px;position:relative;">'
      +'<div style="position:absolute;left:-8px;top:14px;width:0;height:0;border-top:7px solid transparent;border-bottom:7px solid transparent;border-right:8px solid rgba(93,170,120,.22);"></div>'
      +'<div id="bubbleTxt" style="font-size:14px;font-weight:700;color:var(--cream);line-height:1.55;">'+p.narr+'</div>'
      +'</div></div>'

      /* Dua badge */
      +'<div style="text-align:center;padding:4px 0 6px;flex-shrink:0;">'
      +'<span style="display:inline-block;background:rgba(200,144,64,.08);border:1px solid rgba(200,144,64,.2);border-radius:99px;padding:4px 16px;font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(232,176,96,.7);">🌙 Doa Sebelum Tidur</span>'
      +'</div>'

      /* Arabic card — NO absolute positioned overlay */
      +'<div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 18px;">'
      +'<div id="araCard" style="background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.09);border-radius:20px;padding:18px 18px 14px;transition:border-color .4s;">'

        /* Arabic text — big, right-aligned, no overlaps */
        +'<div style="text-align:right;margin-bottom:10px;">'
        +'<div id="araText" style="font-family:\'Scheherazade New\',serif;font-size:clamp(24px,7.5vw,34px);font-weight:700;color:var(--gold-lt);direction:rtl;line-height:1.85;">'+p.arabic+'</div>'
        +'</div>'

        /* Divider */
        +'<div style="height:1px;background:rgba(255,255,255,.07);margin-bottom:10px;"></div>'

        /* Latin + meaning at bottom — clean, no overlap */
        +'<div style="text-align:left;">'
        +'<div style="font-size:13px;font-weight:700;color:var(--cream);font-style:italic;margin-bottom:3px;">'+p.lat+'</div>'
        +'<div style="font-size:12px;color:var(--cream-dim);line-height:1.5;">'+p.mean+'</div>'
        +'</div>'

        /* Sound wave bars — shown while speaking */
        +'<div id="waveBar" style="display:none;justify-content:center;align-items:flex-end;height:22px;gap:3px;margin-top:10px;">'
        +'<div style="width:4px;height:8px;border-radius:2px;background:rgba(200,144,64,.5);animation:wv .44s 0s ease-in-out infinite;transform-origin:bottom;"></div>'
        +'<div style="width:4px;height:14px;border-radius:2px;background:rgba(200,144,64,.5);animation:wv .52s .08s ease-in-out infinite;transform-origin:bottom;"></div>'
        +'<div style="width:4px;height:20px;border-radius:2px;background:rgba(200,144,64,.6);animation:wv .48s .16s ease-in-out infinite;transform-origin:bottom;"></div>'
        +'<div style="width:4px;height:14px;border-radius:2px;background:rgba(200,144,64,.5);animation:wv .56s .06s ease-in-out infinite;transform-origin:bottom;"></div>'
        +'<div style="width:4px;height:8px;border-radius:2px;background:rgba(200,144,64,.45);animation:wv .44s .12s ease-in-out infinite;transform-origin:bottom;"></div>'
        +'</div>'

      +'</div></div>'

      /* Buttons */
      +'<div style="padding:8px 18px 18px;flex-shrink:0;display:flex;flex-direction:column;gap:8px;">'

        /* Replay — secondary */
        +'<button id="replayBtn" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:11px;font-family:inherit;font-size:14px;font-weight:800;color:var(--cream-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;transition:.15s;">🔊 Dengar lagi</button>'

        /* Continue — primary, disabled until audio finishes */
        +'<button id="lanjutBtn" disabled style="background:linear-gradient(135deg,var(--green),#3A7050);border:none;border-radius:14px;padding:15px;font-family:inherit;font-size:16px;font-weight:900;color:#fff;cursor:pointer;width:100%;box-shadow:0 4px 18px rgba(44,90,62,.4);opacity:.38;transition:opacity .35s,box-shadow .35s;">'+p.btnTxt+'</button>'

      +'</div>';

    /* Attach button events */
    document.getElementById('replayBtn').addEventListener('click', playPhase);
    document.getElementById('lanjutBtn').addEventListener('click', nextPhase);

    /* Auto-play after a settling delay */
    setTimeout(playPhase, 680);
  }

  function showWave(on){
    var w=document.getElementById('waveBar');
    if(w) w.style.display=on?'flex':'none';
  }

  function playPhase(){
    var p=PHASES[phIdx];
    var btn=document.getElementById('lanjutBtn');
    if(btn){btn.disabled=true;btn.style.opacity='.38';}
    showWave(true);
    speakGuided(p.speakN, p.speakA, function(){
      showWave(false);
      /* If last phase, say encouragement then a second pass */
      if(p.narr2){
        var bbl=document.getElementById('bubbleTxt');
        if(bbl) bbl.textContent=p.narr2;
        setTimeout(function(){
          showWave(true);
          speakMom(p.speakN2, function(){
            setTimeout(function(){
              speakAr(p.speakA, function(){
                showWave(false);
                enableGo();
              });
            },400);
          });
        },500);
      } else {
        enableGo();
        /* Update bubble to short praise */
        var bbl=document.getElementById('bubbleTxt');
        if(bbl) bbl.textContent = phIdx===0 ? 'Bagus! Tirukan ya sayang... 🌙' : 'Kamu bisa! Tirukan pelan-pelan... ✨';
      }
      /* Highlight card when audio done */
      var card=document.getElementById('araCard');
      if(card) card.style.borderColor='rgba(109,184,130,.35)';
    });
  }

  function enableGo(){
    canGo=true;
    var btn=document.getElementById('lanjutBtn');
    if(btn){
      btn.disabled=false;
      btn.style.opacity='1';
      btn.style.boxShadow='0 4px 24px rgba(44,90,62,.6)';
      btn.style.animation='pu 2.2s ease-in-out infinite';
    }
    vib(35);
  }

  function nextPhase(){
    if(!canGo) return;
    speechSynthesis.cancel();
    phIdx++;
    if(phIdx>=PHASES.length){
      /* All phases done — celebrate */
      wrap.innerHTML=
        '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;">'
        +'<div style="font-size:52px;margin-bottom:12px;animation:fl 2s ease-in-out infinite;">🤲</div>'
        +'<div style="font-size:26px;font-weight:900;color:var(--gold-lt);margin-bottom:8px;">Aamiin ya Rabb...</div>'
        +'<div style="font-family:\'Scheherazade New\',serif;font-size:22px;color:var(--gold);direction:rtl;margin-bottom:10px;">بِسْمِكَ اللَّهُمَّ أَحْيَا وَأَمُوتُ</div>'
        +'<div style="font-size:14px;color:var(--cream-dim);line-height:1.6;">Bismika Allāhumma aḥyā wa amūtu<br><span style="font-size:12px;opacity:.7;">Dengan nama-Mu ya Allah, aku hidup dan aku mati</span></div>'
        +'<div style="margin-top:16px;font-size:15px;font-weight:800;color:var(--green-glow);">Alhamdulillah, kamu sudah hafal doanya! 🌟</div>'
        +'</div>';
      vib([60,30,60,30,100]);
      setTimeout(done,2200);
    } else {
      /* Fade to next phase */
      wrap.style.opacity='0';
      wrap.style.transform='translateY(-16px)';
      wrap.style.transition='all .28s ease';
      setTimeout(function(){
        wrap.style.transition='none';
        wrap.style.opacity='0';
        wrap.style.transform='translateY(18px)';
        render();
        requestAnimationFrame(function(){requestAnimationFrame(function(){
          wrap.style.transition='all .4s cubic-bezier(.34,1.56,.64,1)';
          wrap.style.opacity='1';
          wrap.style.transform='translateY(0)';
        });});
      },280);
    }
  }

  /* First render */
  render();
}

/* ══════════════════════════════════════════
   STEP 4 — TARIK SELIMUT (Blanket)
   Drag blanket over Baby Mo in bed
══════════════════════════════════════════ */
function buildBlanket(wrap,done){
  var prog=0,pdown=false,startY=0,startProg=0,finished=false;

  wrap.innerHTML='<div class="shead"><div class="snum">Langkah 4 dari 4</div><div class="stitle" id="blt">🌙 Tarik Selimut</div><div class="shint" id="blh">Seret selimut ke atas untuk tidur!</div></div>'
    +'<div id="dz" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 24px 16px;touch-action:none;cursor:grab;">'
    +'<div class="bedframe">'
    // Bed headboard
    +'<div style="position:absolute;top:0;left:0;right:0;height:22px;background:linear-gradient(90deg,#1A3A28,#243A30);border-radius:24px 24px 0 0;"></div>'
    // Bed base
    +'<div style="position:absolute;bottom:0;left:0;right:0;height:50%;background:rgba(0,10,5,.9);"></div>'
    // Pillow + Baby Mo face area
    +'<div style="position:absolute;top:28px;left:14px;right:14px;height:70px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:16px;display:flex;align-items:center;justify-content:center;overflow:visible;">'
    // Baby Mo face (will be emoji based — changes as blanket covers)
    +'<div id="blf" style="font-size:52px;transition:all .6s;">👀</div>'
    // Zzz that appears when sleeping
    +'<div id="zw" style="display:none;position:absolute;right:8px;top:-20px;">'
    +'<span style="font-size:12px;color:rgba(200,144,64,.4);animation:zf 1.5s 0s ease infinite;display:inline-block;font-family:Nunito,sans-serif;font-weight:900;">z</span>'
    +'<span style="font-size:18px;color:rgba(200,144,64,.5);animation:zf 1.9s .4s ease infinite;display:inline-block;font-family:Nunito,sans-serif;font-weight:900;">z</span>'
    +'<span style="font-size:25px;color:rgba(200,144,64,.55);animation:zf 2.3s .8s ease infinite;display:inline-block;font-family:Nunito,sans-serif;font-weight:900;">Z</span>'
    +'</div>'
    +'</div>'
    // Green blanket that slides up
    +'<div id="blo" class="blkout" style="top:88%;">'
    +'<div class="blkbody">'
    +'<div style="position:absolute;inset:0;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.025) 0,rgba(255,255,255,.025) 10px,transparent 10px,transparent 20px);"></div>'
    +'<div style="position:absolute;top:12px;left:0;right:0;display:flex;justify-content:space-evenly;font-size:12px;color:rgba(200,220,180,.15);"><span>★</span><span>✦</span><span>★</span><span>✦</span><span>★</span></div>'
    +'</div>'
    +'<div class="blkfold"><div id="blg" class="blkgrip"></div></div>'
    +'</div>'
    +'</div>'
    // Drag hint arrow
    +'<div id="bla" style="margin-top:18px;text-align:center;color:var(--green-glow);font-size:13px;font-weight:800;animation:fl 1.8s ease-in-out infinite;pointer-events:none;">'
    +'<div style="font-size:28px;">↑</div><div>Seret ke atas</div>'
    +'</div>'
    +'</div>';

  function upd(){
    var f=document.getElementById('blf');
    if(!f)return;
    if(finished)f.textContent='😴';
    else if(prog>.75)f.textContent='🌙';
    else if(prog>.45)f.textContent='😌';
    else if(prog>.2)f.textContent='😊';
    else f.textContent='👀';
    var b=document.getElementById('blo');
    if(b)b.style.top=(88-prog*72)+'%';
    if(prog>.08){var a=document.getElementById('bla');if(a)a.style.display='none';}
  }

  function finish(){
    if(finished)return;finished=true;vib([80,40,120]);
    var g=document.getElementById('blg');if(g)g.style.display='none';
    var z=document.getElementById('zw');if(z)z.style.display='block';
    var t=document.getElementById('blt');if(t)t.textContent='💤 Selamat Tidur!';
    var h=document.getElementById('blh');if(h)h.textContent='Baby Mo sudah tidur... 🌙';
    var f=document.getElementById('blf');
    if(f){f.textContent='😴';f.style.filter='drop-shadow(0 0 16px rgba(200,144,64,.5))';}
    setTimeout(done,1300);
  }

  var dz=document.getElementById('dz');
  dz.addEventListener('pointerdown',function(e){pdown=true;startY=e.clientY;startProg=prog;dz.setPointerCapture(e.pointerId);});
  dz.addEventListener('pointermove',function(e){
    if(!pdown||finished)return;
    var dy=startY-e.clientY;var H=dz.clientHeight||260;
    prog=Math.max(0,Math.min(1,startProg+dy/(H*.58)));
    var b=document.getElementById('blo');if(b)b.style.transition='none';
    upd();if(prog>=1)finish();
  });
  dz.addEventListener('pointerup',function(){
    pdown=false;
    if(!finished&&prog<.38){prog=0;var b=document.getElementById('blo');if(b)b.style.transition='top .4s ease';upd();}
  });
  dz.addEventListener('pointercancel',function(){pdown=false;});
  upd();
}

/* ── SLEEP MODE ── */
function startSleep(){
  LUL.start();
  var viz=document.getElementById('viz');
  [2,3,5,4,7,5,4,3,5,7].forEach(function(h,i){
    var b=document.createElement('div');
    b.style.cssText='width:5px;height:'+(h*3.8)+'px;border-radius:99px;background:rgba(200,144,64,'+(0.15+i*.022)+');animation:wv '+(0.55+i*.13)+'s '+(i*.09)+'s ease-in-out infinite;transform-origin:bottom;';
    viz.appendChild(b);
  });
  setTimeout(function(){document.getElementById('sleepcontent').style.opacity='1';},600);
  var dim=document.getElementById('sleepdim'),d=0;
  var iv=setInterval(function(){d=Math.min(d+.003,.8);dim.style.opacity=d;if(d>=.8)clearInterval(iv);},130);
}
</script>
</body>
