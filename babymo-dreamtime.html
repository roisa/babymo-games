@keyframes pu{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes su{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes pk{0%{transform:scale(0) rotate(-15deg);opacity:0}65%{transform:scale(1.15) rotate(5deg)}100%{transform:scale(1);opacity:1}}

@keyframes bt{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}

/* ── UTILS ── */
function vib(p){try{navigator.vibrate&&navigator.vibrate(p||40);}catch(e){}}

/* ── WEB AUDIO CTX (shared) ── */
var _audioCtx=null;
function getACtx(){
  if(!_audioCtx){try{_audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  return _audioCtx;
}

/* ── BRUSH BRISTLE SOUND ── */
function playBrushSound(){
  var ctx=getACtx();if(!ctx)return;
  try{
    var dur=0.09;
    var bufSize=Math.floor(ctx.sampleRate*dur);
    var buf=ctx.createBuffer(1,bufSize,ctx.sampleRate);
    var data=buf.getChannelData(0);
    for(var i=0;i<bufSize;i++) data[i]=(Math.random()*2-1);
    var src=ctx.createBufferSource();src.buffer=buf;
    var bpf=ctx.createBiquadFilter();bpf.type='bandpass';bpf.frequency.value=3200;bpf.Q.value=1.2;
    var lpf=ctx.createBiquadFilter();lpf.type='lowpass';lpf.frequency.value=5500;
    var gain=ctx.createGain();
    gain.gain.setValueAtTime(0.28,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    src.connect(bpf);bpf.connect(lpf);lpf.connect(gain);gain.connect(ctx.destination);
    src.start(ctx.currentTime);src.stop(ctx.currentTime+dur);
  }catch(e){}
}

/* ── VOICE SYSTEM — Female Indonesian preference ── */
var _vlist=[], _arV=null, _idV=null;
function _initVoices(){
  if(!window.speechSynthesis)return;
  function load(){
    _vlist=speechSynthesis.getVoices();
    /* Arabic voice */
    _arV=_vlist.find(function(v){return v.lang==='ar-SA';})||
         _vlist.find(function(v){return v.lang==='ar-EG';})||
         _vlist.find(function(v){return v.lang.startsWith('ar');})||null;
    /* Female Indonesian voice — try by name first */
    _idV=_vlist.find(function(v){return v.lang==='id-ID'&&(v.name.toLowerCase().includes('female')||v.name.includes('Damayanti')||v.name.includes('Google Bahasa Indonesia'));})
        ||_vlist.find(function(v){return v.lang==='id-ID';})
        ||_vlist.find(function(v){return v.lang.startsWith('id');})||null;
  }
  load();
  if(speechSynthesis.onvoiceschanged!==undefined) speechSynthesis.onvoiceschanged=load;
}
_initVoices();

function speakMom(txt,cb){
  if(!window.speechSynthesis){if(cb)setTimeout(cb,0);return;}
  var attempts=0;
  function trySpeak(){
    var voices=speechSynthesis.getVoices();
    _idV=voices.find(function(v){return v.lang==='id-ID'&&(v.name.toLowerCase().includes('female')||v.name.includes('Damayanti')||v.name.includes('Google Bahasa Indonesia'));})
        ||voices.find(function(v){return v.lang==='id-ID';})
        ||voices.find(function(v){return v.lang.startsWith('id');})||_idV;
    var u=new SpeechSynthesisUtterance(txt);
    u.lang='id-ID';
    u.rate=0.80;
    u.pitch=1.45; /* higher = warmer, feminine */
    u.volume=1.0;
    if(_idV){u.voice=_idV;u.voiceURI=_idV.voiceURI;}
    u.onend=u.onerror=function(){if(cb)setTimeout(cb,260);};
    speechSynthesis.cancel();
    setTimeout(function(){speechSynthesis.speak(u);},120);
  }
  trySpeak();
}

function speakAr(txt,cb){
  if(!window.speechSynthesis){if(cb)setTimeout(cb,0);return;}
  var u=new SpeechSynthesisUtterance(txt);
  u.lang='ar-SA';u.rate=0.40;u.pitch=1.05;u.volume=1.0;
  if(_arV){u.voice=_arV;u.voiceURI=_arV.voiceURI;}
  u.onend=u.onerror=function(){if(cb)setTimeout(cb,0);};
  speechSynthesis.cancel();
  setTimeout(function(){speechSynthesis.speak(u);},120);
}

function speakGuided(narr,ar,cb){
  speechSynthesis.cancel();
  speakMom(narr,function(){
    setTimeout(function(){speakAr(ar,function(){if(cb)cb();});},550);
  });
}

/* ── LULLABY ── */
var LUL=(function(){
  var ctx,gain,on=false,tm,ni=0,nt=0;
  var N=[[196,.8],[220,.8],[247,.6],[196,.2],[220,.9],[294,.8],[330,.6],[294,.2],[220,.8],[196,.6],[247,.4],[196,.2],[165,1.4],[0,.5],[196,.7],[220,.7],[247,.5],[294,.7],[330,.9],[294,.6],[247,.6],[220,.6],[196,1.7],[0,.9]];
  function note(f,s,d){
    if(!f||!gain)return;
    var o=ctx.createOscillator(),e=ctx.createGain(),fl=ctx.createBiquadFilter();
    fl.type='lowpass';fl.frequency.value=480;
    o.type='sine';o.frequency.value=f;
    o.connect(fl);fl.connect(e);e.connect(gain);
    e.gain.setValueAtTime(0,s);
    e.gain.linearRampToValueAtTime(.5,s+Math.min(.07,d*.15));
    e.gain.exponentialRampToValueAtTime(.001,s+d-.05);
    o.start(s);o.stop(s+d);
  }
  function tick(){
    while(nt<ctx.currentTime+.7){var n=N[ni%N.length];note(n[0],nt,n[1]);nt+=n[1];ni++;}
    if(on)tm=setTimeout(tick,200);
  }
  return{
    start:function(){
      if(on)return;
      try{
        ctx=new(window.AudioContext||window.webkitAudioContext)();
        gain=ctx.createGain();
        gain.gain.setValueAtTime(0,ctx.currentTime);
        gain.gain.linearRampToValueAtTime(.2,ctx.currentTime+7);
        gain.connect(ctx.destination);
        nt=ctx.currentTime+1.2;ni=0;on=true;tick();
      }catch(e){}
    },
    stop:function(){on=false;clearTimeout(tm);}
  };
})();

/* ── SCREEN NAV ── */
function show(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('on');});
  document.getElementById('s-'+id).classList.add('on');
}

document.getElementById('btn-start').addEventListener('click',function(){vib(60);show('steps');runStep(0);});
document.getElementById('btn-home').addEventListener('click',function(){vib(40);speechSynthesis.cancel();show('home');});

function setP(idx){document.getElementById('pfill').style.width=(idx/4*100)+'%';}

function addRipple(el,e,color){
  var r=document.createElement('div');r.className='ripel';
  var rect=el.getBoundingClientRect();
  var x=(e.clientX||rect.left+rect.width/2)-rect.left;
  var y=(e.clientY||rect.top+rect.height/2)-rect.top;
  var sz=Math.max(rect.width,rect.height)*2;
  r.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+(x-sz/2)+'px;top:'+(y-sz/2)+'px;background:'+(color||'rgba(255,255,255,.2)')+';';
  el.appendChild(r);setTimeout(function(){r.remove();},700);
}

var BUILDERS=[buildBrush,buildPajamas,buildDoa,buildBlanket];
function runStep(idx){
  setP(idx);
  var body=document.getElementById('stepbody');
  body.innerHTML='';
  body.style.cssText='flex:1;display:flex;flex-direction:column;overflow:hidden;opacity:0;transform:translateY(30px);';
  BUILDERS[idx](body,function(){
    body.style.cssText='flex:1;display:flex;flex-direction:column;overflow:hidden;opacity:0;transform:translateY(-24px);transition:all .38s ease;';
    setTimeout(function(){
      if(idx+1<BUILDERS.length){runStep(idx+1);}
      else{show('sleep');startSleep();}
    },400);
  });
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    body.style.cssText='flex:1;display:flex;flex-direction:column;overflow:hidden;opacity:1;transform:translateY(0);transition:all .5s cubic-bezier(.34,1.56,.64,1);';
  });});
}

/* ══════════════════════════════════════════
   STEP 1 — GOSOK GIGI + BRUSH SOUND
══════════════════════════════════════════ */
function buildBrush(wrap,done){
  var NEED=7,count=0,bx=50,finished=false,pdown=false,refX=0,lastDir=null,moveX=0;
  var FACES=['😐','🙂','😊','😄','🤩','✨','😁'];

  wrap.innerHTML=
    '<div class="shead"><div class="snum">Langkah 1 dari 4</div><div class="stitle">🪥 Gosok Gigi</div><div class="shint">Geser kiri ← → kanan untuk menyikat!</div></div>'
    /* Real Baby Mo logo */
    +'<div style="display:flex;justify-content:center;padding:4px 0 2px;flex-shrink:0;position:relative;">'
    +'<div style="position:relative;display:inline-block;">'
    +'<img src="Logo_Baby_Mo_Transparant.png" alt="Baby Mo" style="width:118px;height:118px;object-fit:contain;filter:drop-shadow(0 4px 14px rgba(0,0,0,.35));animation:mof 3.6s ease-in-out infinite;"/>'
    /* Toothbrush overlay — positioned near "mouth" area */
    +'<div id="brushOverlay" style="position:absolute;bottom:18px;right:-10px;font-size:30px;transform:rotate(22deg);transition:transform .2s;filter:drop-shadow(0 2px 8px rgba(62,207,184,.5));">🪥</div>'
    +'<div id="toothGlow" style="position:absolute;bottom:22px;left:50%;transform:translateX(-50%);width:38px;height:8px;background:rgba(62,207,184,0);border-radius:99px;transition:background .4s;"></div>'
    +'</div></div>'
    +'<div style="padding:0 24px;flex-shrink:0;">'
    +'<div style="background:rgba(255,255,255,.07);border-radius:99px;height:8px;overflow:hidden;margin-bottom:5px;"><div id="bprog" style="height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,#3ECFB8,#7EE8DC);transition:width .3s;"></div></div>'
    +'<div style="display:flex;justify-content:space-between;font-size:11px;font-weight:800;color:var(--cream-dim);"><span>Mulai</span><span id="bcnt" style="color:#3ECFB8;">0/'+NEED+'</span><span>Bersih ✓</span></div>'
    +'</div>'
    +'<div style="flex:1;display:flex;align-items:center;justify-content:center;padding:8px 24px;">'
    +'<div style="width:100%;max-width:320px;">'
    +'<div id="bzone" style="position:relative;height:88px;border-radius:22px;background:rgba(255,255,255,.05);border:2px solid var(--border);touch-action:none;cursor:grab;overflow:hidden;">'
    +'<div style="position:absolute;top:50%;left:12px;right:12px;height:2px;background:rgba(255,255,255,.1);border-radius:99px;transform:translateY(-50%);"></div>'
    +'<div id="bfill" style="position:absolute;top:50%;left:12px;width:0%;height:2px;background:linear-gradient(90deg,#3ECFB8,transparent);transform:translateY(-50%);"></div>'
    +'<div id="bbrush" style="position:absolute;top:50%;left:50%;font-size:44px;line-height:1;transform:translateX(-50%) translateY(-50%) rotate(22deg);pointer-events:none;filter:drop-shadow(0 3px 12px rgba(62,207,184,.45));">🪥</div>'
    +'<div id="barrows" style="position:absolute;bottom:7px;left:0;right:0;pointer-events:none;display:flex;justify-content:space-between;padding:0 18px;font-size:22px;color:rgba(255,255,255,.2);animation:pu 1.8s infinite;"><span>←</span><span>→</span></div>'
    +'</div>'
    +'<div id="breact" style="text-align:center;margin-top:9px;font-size:24px;min-height:30px;"></div>'
    +'</div></div>'
    +'<div id="bdone" style="display:none;" class="donebanner"><div style="font-size:40px;">✨😁✨</div><div style="font-size:22px;font-weight:900;color:#3ECFB8;">Gigi bersih &amp; putih!</div></div>';

  function refreshGlow(){
    var p=count/NEED;
    /* Toothbrush glow gets more teal as teeth get cleaner */
    var glow=document.getElementById('toothGlow');
    if(glow)glow.style.background='rgba(62,207,184,'+(p*0.5)+')';
  }

  function addStroke(dir){
    if(dir===lastDir||finished)return;
    lastDir=dir;count=Math.min(count+1,NEED);
    vib(32);
    playBrushSound(); /* 🔊 bristle sound on each stroke */
    document.getElementById('bcnt').textContent=count+'/'+NEED;
    document.getElementById('bprog').style.width=(count/NEED*100)+'%';
    document.getElementById('breact').textContent=FACES[Math.min(count,6)];
    refreshGlow();
    if(count>=NEED&&!finished){
      finished=true;vib(100);
      var a=document.getElementById('barrows');if(a)a.style.display='none';
      document.getElementById('breact').textContent='😁 Bersih!';
      document.getElementById('bdone').style.display='block';
      setTimeout(done,1100);
    }
  }

  function updateBrush(){
    var el=document.getElementById('bbrush');var fill=document.getElementById('bfill');
    var bo=document.getElementById('brushOverlay');
    if(!el)return;
    el.style.left=bx+'%';
    var rot=bx>50?-26:26;
    el.style.transform='translateX(-50%) translateY(-50%) rotate('+rot+'deg)';
    if(bo) bo.style.transform='rotate('+(rot+22)+'deg) scale('+(finished?0.8:1)+')';
    if(fill)fill.style.width=Math.max(0,bx-12)/76*100+'%';
  }

  var zone=document.getElementById('bzone');
  zone.addEventListener('pointerdown',function(e){pdown=true;refX=e.clientX;moveX=e.clientX;lastDir=null;zone.setPointerCapture(e.pointerId);});
  zone.addEventListener('pointermove',function(e){
    if(!pdown)return;
    var dx=e.clientX-moveX;moveX=e.clientX;
    bx=Math.max(10,Math.min(90,bx+(dx/zone.clientWidth)*115));
    updateBrush();
    var total=e.clientX-refX;
    if(total>38&&lastDir!=='R'){addStroke('R');lastDir='R';refX=e.clientX;}
    else if(total<-38&&lastDir!=='L'){addStroke('L');lastDir='L';refX=e.clientX;}
  });
  zone.addEventListener('pointerup',function(){pdown=false;if(!finished){bx=50;updateBrush();}});
  zone.addEventListener('pointercancel',function(){pdown=false;if(!finished){bx=50;updateBrush();}});
}

function buildPajamas(wrap,done){
  var items=[
    {emoji:'👕',label:'Baju Tidur',   color:'#9070C8', hue:270},
    {emoji:'🩲',label:'Celana Tidur', color:'#5878C8', hue:220},
    {emoji:'🧸',label:'Ambil Boneka', color:'#C89040', hue:40}
  ];
  var tapped=0;
  var overlayColors=['','rgba(144,112,200,.28)','rgba(88,120,200,.22)'];

  wrap.innerHTML=
    '<div class="shead"><div class="snum">Langkah 2 dari 4</div><div class="stitle">👕 Ganti Baju</div><div class="shint">Ketuk setiap item untuk memakainya!</div></div>'
    +'<div style="display:flex;justify-content:center;align-items:flex-end;gap:16px;padding:6px 0 2px;flex-shrink:0;">'
      /* Boneka — appears after all tapped */
      +'<div id="boneka" style="font-size:52px;opacity:.18;transition:all .6s cubic-bezier(.34,1.56,.64,1);transform:scale(.8);animation:bonkSway 3s ease-in-out infinite;">🧸</div>'
      /* Baby Mo logo with overlay wrapper */
      +'<div style="position:relative;display:inline-block;">'
      +'<img id="pjmo" src="Logo_Baby_Mo_Transparant.png" alt="Baby Mo" style="width:108px;height:108px;object-fit:contain;filter:drop-shadow(0 4px 14px rgba(0,0,0,.35));animation:mof 3.6s ease-in-out infinite;transition:filter .5s;"/>'
      /* Color overlay tint div */
      +'<div id="pjOverlay" style="position:absolute;inset:0;border-radius:50%;background:transparent;mix-blend-mode:color;pointer-events:none;transition:background .6s;"></div>'
      /* Star sparkle that appears on completion */
      +'<div id="pjSparkle" style="position:absolute;top:-8px;right:-8px;font-size:22px;opacity:0;transition:opacity .4s;animation:pu 1.5s ease-in-out infinite;">⭐</div>'
      +'</div>'
      /* Moon — appears */
      +'<div id="moonDeco" style="font-size:36px;opacity:.18;transition:all .6s cubic-bezier(.34,1.56,.64,1);transform:scale(.8);">🌙</div>'
    +'</div>'
    +'<div style="flex:1;display:flex;align-items:center;justify-content:center;padding:4px 24px;">'
    +'<div class="pjgrid" id="pjgrid"></div>'
    +'</div>'
    +'<div id="pjdone" style="display:none;" class="donebanner"><div style="font-size:40px;">🌙✨</div><div style="font-size:22px;font-weight:900;color:var(--purple);">Siap untuk tidur!</div></div>';

  var grid=document.getElementById('pjgrid');
  items.forEach(function(item,i){
    var el=document.createElement('div');
    el.className='pjitem';
    if(i===2)el.style.gridColumn='1/-1';
    el.innerHTML=
      '<div style="font-size:52px;line-height:1;margin-bottom:8px;transition:all .3s;">'+item.emoji+'</div>'
      +'<div style="font-size:13px;font-weight:800;color:var(--cream-dim);transition:color .3s;">'+item.label+'</div>';

    function tap(e){
      if(el.dataset.done)return;
      el.dataset.done='1';tapped++;vib(45);
      addRipple(el,e,item.color+'44');
      el.style.borderColor=item.color;
      el.style.background=item.color+'18';
      el.querySelector('div').style.animation='pk .5s cubic-bezier(.34,1.56,.64,1)';
      el.querySelectorAll('div')[1].textContent='Sudah! ✓';
      el.querySelectorAll('div')[1].style.color=item.color;

      /* Update overlay color on Baby Mo logo */
      var overlay=document.getElementById('pjOverlay');
      if(overlay&&i<2){
        overlay.style.background=overlayColors[tapped]||'';
      }

      /* When baju + celana done — show boneka & moon bigger */
      if(tapped===2){
        var mo=document.getElementById('pjmo');
        if(mo) mo.style.filter='drop-shadow(0 0 16px rgba(144,112,200,.55)) drop-shadow(0 4px 14px rgba(0,0,0,.35))';
      }

      /* When boneka tapped */
      if(i===2){
        var bnk=document.getElementById('boneka');
        var moon=document.getElementById('moonDeco');
        var spk=document.getElementById('pjSparkle');
        if(bnk){bnk.style.opacity='1';bnk.style.transform='scale(1.1)';}
        if(moon){moon.style.opacity='1';moon.style.transform='scale(1.1)';}
        if(spk) spk.style.opacity='1';
        el.querySelector('div').textContent='🥰';
      }

      if(tapped>=items.length){
        document.getElementById('pjdone').style.display='block';
        vib([70,35,70]);
        setTimeout(done,800);
      }
    }
    el.addEventListener('click',tap);
    el.addEventListener('pointerdown',function(e){e.preventDefault();},{passive:false});
    el.addEventListener('pointerup',tap);
    grid.appendChild(el);
  });
}

      +'<div><div style="font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:4px;">MOM\'S TIP</div>'
      +'<div style="font-size:12px;color:var(--cream-dim);line-height:1.55;">Ajak si kecil ucapkan pelan-pelan setiap malam ya... Allah Maha Mendengar doa anak yang tulus. ❤️</div></div>'
      +'</div>'

      /* Lanjut button */
      +'<button id="doaLanjut" disabled style="width:100%;background:linear-gradient(135deg,var(--green),#3A7050);border:none;border-radius:14px;padding:16px;font-family:inherit;font-size:17px;font-weight:900;color:#fff;cursor:pointer;box-shadow:0 4px 18px rgba(44,90,62,.4);opacity:.35;transition:opacity .35s;">Aamiin 🤲 — Lanjut Tidur</button>'

    +'</div>'; /* end scrollable */

  /* Wire up audio buttons */
  document.getElementById('snd-card1').addEventListener('click',function(){
    playPart(0,'card1','Bismika Allāhumma',DUA_PARTS[0].speakAr,null);
  });
  document.getElementById('snd-card2').addEventListener('click',function(){
    playPart(1,'card2','ahya wa amut',DUA_PARTS[1].speakAr,null);
  });
  document.getElementById('snd-cardFull').addEventListener('click',function(){
    if(anyPlaying)return;
    anyPlaying=true;
    var btn=document.getElementById('snd-cardFull');
    if(btn){btn.textContent='⏸ Sedang diputar...';btn.style.opacity='.7';}
    showWaveFor('cardFull',true);
    speakMom('Bismika Allāhumma ahya wa amut',function(){
      setTimeout(function(){
        speakAr(FULL.speakAr,function(){
          anyPlaying=false;showWaveFor('cardFull',false);
          if(btn){btn.textContent='🔊 Dengar Doa Lengkap';btn.style.opacity='1';}
          setPlayed(2,'cardFull');
        });
      },350);
    });
  });

  document.getElementById('doaLanjut').addEventListener('click',function(){
    if(!played[2])return;
    speechSynthesis.cancel();
    /* Celebration before moving on */
    wrap.innerHTML=
      '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;">'
      +'<div style="font-size:52px;margin-bottom:12px;animation:fl 2s ease-in-out infinite;">🤲</div>'
      +'<div style="font-size:26px;font-weight:900;color:var(--gold-lt);margin-bottom:8px;">Aamiin ya Rabb...</div>'
      +'<div style="font-family:\'Scheherazade New\',serif;font-size:22px;color:var(--gold);direction:rtl;margin-bottom:10px;">بِسْمِكَ اللَّهُمَّ أَحْيَا وَأَمُوتُ</div>'
      +'<div style="font-size:14px;color:var(--cream-dim);line-height:1.6;">Bismika Allāhumma aḥyā wa amūtu<br><span style="font-size:12px;opacity:.7;">Dengan nama-Mu ya Allah, aku hidup dan aku mati</span></div>'
      +'<div style="margin-top:16px;font-size:15px;font-weight:800;color:var(--green-glow);">Masya Allah, kamu sudah hafal doanya! 🌟</div>'
      +'</div>';
    vib([60,30,60,30,100]);
    setTimeout(done,2200);
  });
}

/* ══════════════════════════════════════════
   STEP 4 — TARIK SELIMUT
══════════════════════════════════════════ */
function buildBlanket(wrap,done){
  var prog=0,pdown=false,startY=0,startProg=0,finished=false;

  wrap.innerHTML=
    '<div class="shead"><div class="snum">Langkah 4 dari 4</div><div class="stitle" id="blt">🌙 Tarik Selimut</div><div class="shint" id="blh">Seret selimut ke atas untuk tidur!</div></div>'
    +'<div id="dz" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 24px 16px;touch-action:none;cursor:grab;">'
    +'<div class="bedframe">'
    +'<div style="position:absolute;top:0;left:0;right:0;height:22px;background:linear-gradient(90deg,#1A3A28,#243A30);border-radius:24px 24px 0 0;"></div>'
    +'<div style="position:absolute;bottom:0;left:0;right:0;height:50%;background:rgba(0,10,5,.9);"></div>'
    +'<div style="position:absolute;top:28px;left:14px;right:14px;height:70px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:16px;display:flex;align-items:center;justify-content:center;overflow:visible;">'
    +'<div id="blf" style="font-size:52px;transition:all .6s;">👀</div>'
    +'<div id="zw" style="display:none;position:absolute;right:8px;top:-20px;">'
    +'<span style="font-size:12px;font-weight:900;color:rgba(200,144,64,.4);animation:zf 1.5s 0s ease infinite;display:inline-block;font-family:Nunito,sans-serif;">z</span>'
    +'<span style="font-size:18px;font-weight:900;color:rgba(200,144,64,.5);animation:zf 1.9s .4s ease infinite;display:inline-block;font-family:Nunito,sans-serif;">z</span>'
    +'<span style="font-size:25px;font-weight:900;color:rgba(200,144,64,.55);animation:zf 2.3s .8s ease infinite;display:inline-block;font-family:Nunito,sans-serif;">Z</span>'
    +'</div>'
    +'</div>'
    +'<div id="blo" class="blkout" style="top:88%;">'
    +'<div class="blkbody">'
    +'<div style="position:absolute;inset:0;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.025) 0,rgba(255,255,255,.025) 10px,transparent 10px,transparent 20px);"></div>'
    +'<div style="position:absolute;top:12px;left:0;right:0;display:flex;justify-content:space-evenly;font-size:12px;color:rgba(200,220,180,.15);"><span>★</span><span>✦</span><span>★</span><span>✦</span><span>★</span></div>'
    +'</div>'
    +'<div class="blkfold"><div id="blg" class="blkgrip"></div></div>'
    +'</div>'
    +'</div>'
    +'<div id="bla" style="margin-top:18px;text-align:center;color:var(--green-glow);font-size:13px;font-weight:800;animation:fl 1.8s ease-in-out infinite;pointer-events:none;">'
    +'<div style="font-size:28px;">↑</div><div>Seret ke atas</div>'
    +'</div>'
    +'</div>';

  function upd(){
    var f=document.getElementById('blf');if(!f)return;
    if(finished)f.textContent='😴';
    else if(prog>.75)f.textContent='🌙';
    else if(prog>.45)f.textContent='😌';
    else if(prog>.2)f.textContent='😊';
    else f.textContent='👀';
    var b=document.getElementById('blo');
    if(b)b.style.top=(88-prog*72)+'%';
    if(prog>.08){var a=document.getElementById('bla');if(a)a.style.display='none';}
  }

  function finish(){
    if(finished)return;finished=true;vib([80,40,120]);
    var g=document.getElementById('blg');if(g)g.style.display='none';
    var z=document.getElementById('zw');if(z)z.style.display='block';
    var t=document.getElementById('blt');if(t)t.textContent='💤 Selamat Tidur!';
    var h=document.getElementById('blh');if(h)h.textContent='Baby Mo sudah tidur... 🌙';
    var f=document.getElementById('blf');
    if(f){f.textContent='😴';f.style.filter='drop-shadow(0 0 16px rgba(200,144,64,.5))';}
    setTimeout(done,1300);
  }

  var dz=document.getElementById('dz');
  dz.addEventListener('pointerdown',function(e){pdown=true;startY=e.clientY;startProg=prog;dz.setPointerCapture(e.pointerId);});
  dz.addEventListener('pointermove',function(e){
    if(!pdown||finished)return;
    var dy=startY-e.clientY;var H=dz.clientHeight||260;
    prog=Math.max(0,Math.min(1,startProg+dy/(H*.58)));
    var b=document.getElementById('blo');if(b)b.style.transition='none';
    upd();if(prog>=1)finish();
  });
  dz.addEventListener('pointerup',function(){
    pdown=false;
    if(!finished&&prog<.38){prog=0;var b=document.getElementById('blo');if(b)b.style.transition='top .4s ease';upd();}
  });
  dz.addEventListener('pointercancel',function(){pdown=false;});
  upd();
}

/* ── SLEEP MODE ── */
function startSleep(){
  LUL.start();
  var viz=document.getElementById('viz');
  [2,3,5,4,7,5,4,3,5,7].forEach(function(h,i){
    var b=document.createElement('div');
    b.style.cssText='width:5px;height:'+(h*3.8)+'px;border-radius:99px;background:rgba(200,144,64,'+(0.15+i*.022)+');animation:wv '+(0.55+i*.13)+'s '+(i*.09)+'s ease-in-out infinite;transform-origin:bottom;';
    viz.appendChild(b);
  });
  setTimeout(function(){document.getElementById('sleepcontent').style.opacity='1';},600);
  var dim=document.getElementById('sleepdim'),d=0;
  var iv=setInterval(function(){d=Math.min(d+.003,.8);dim.style.opacity=d;if(d>=.8)clearInterval(iv);},130);
}
</script>
